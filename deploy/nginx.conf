# Validator Pro — nginx reverse proxy
# Place at: /etc/nginx/sites-available/validator-pro
#
# To add HTTPS later:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d validator.yourdomain.com
#
server {
    listen 80;
    server_name _;          # catch-all — replace with your domain when ready

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Proxy to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8502;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (uvicorn hot-reload uses WS)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts — validation can take a while
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Large AI response bodies
    client_max_body_size 10M;
}
