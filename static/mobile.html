        <a href="/?force=desktop" style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 14px', marginBottom: 12, borderRadius: 10, background: T.bg.surface1, border: `1px solid ${T.border.base}`, textDecoration: 'none', color: T.fg[2] }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <span style={{ fontSize: 13, fontWeight: 600, flex: 1 }}>Switch to Desktop version</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.fg[4]} strokeWidth="1.5" strokeLinecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

        {/* Sign out */}
        <MButton variant="danger" fullWidth onClick={handleSignOut} disabled={signOutLoading}>
          {signOutLoading ? <Spinner /> : (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          )}
          Sign Out
        </MButton>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   CLIENT CONFIG SCREEN
   ═════════════════════════════════════════════════════════════════════════ */
const TZ_OPTIONS = [
  'Europe/Berlin','Europe/London','Europe/Paris','Europe/Warsaw','Europe/Vienna',
  'Europe/Zurich','Europe/Amsterdam','Europe/Brussels','Europe/Stockholm',
  'America/New_York','America/Chicago','America/Los_Angeles',
  'Asia/Dubai','Asia/Singapore','UTC',
];

function ClientFormModal({ client, token, onSaved, onClose }) {
  const isNew = !client;
  const [name,     setName]     = useState(client?.name          || '');
  const [accountId,setAccountId]= useState(String(client?.account_id || ''));
  const [tz,       setTz]       = useState(client?.timezone_name  || 'Europe/Berlin');
  const [reqJira,  setReqJira]  = useState(client?.requires_jira !== false);
  const [aliasRaw, setAliasRaw] = useState((client?.aliases || []).join('\n'));
  const [saving,   setSaving]   = useState(false);
  const [err,      setErr]      = useState('');

  async function save() {
    if (!name.trim()) { setErr('Name is required'); return; }
    if (isNew && !accountId) { setErr('Account ID is required'); return; }
    setSaving(true); setErr('');
    try {
      const aliases = aliasRaw.split('\n').map(s => s.trim()).filter(Boolean);
      if (isNew) {
        await mapi('POST', '/api/config/clients', {
          name: name.trim(), account_id: parseInt(accountId) || 0,
          timezone_name: tz, requires_jira: reqJira,
          filters: {}, aliases, mappings: {},
        }, token);
      } else {
        await mapi('PUT', `/api/config/clients/${encodeURIComponent(client.name)}`, {
          timezone_name: tz, requires_jira: reqJira,
          filters: client.filters || {}, aliases, mappings: client.mappings || {},
        }, token);
      }
      onSaved();
      onClose();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  return (
    <div style={{ position:'fixed', inset:0, zIndex:1000, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'flex-end' }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:T.bg.surface1, borderRadius:'14px 14px 0 0', width:'100%', maxHeight:'90vh', overflowY:'auto', padding:'20px 18px', paddingBottom:'calc(20px + env(safe-area-inset-bottom,0px))' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:18 }}>
          <div style={{ fontSize:15, fontWeight:700, color:T.fg[1], flex:1 }}>{isNew ? '＋ New Client' : `Edit — ${client.name}`}</div>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, color:T.fg[3], cursor:'pointer', padding:'0 4px' }}>✕</button>
        </div>

        <ErrorBox msg={err} onDismiss={() => setErr('')} />

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {isNew && (
            <>
              <div>
                <div className="vp-readout-label" style={{ marginBottom:5 }}>Client Name *</div>
                <MInput value={name} onChange={setName} placeholder="e.g. REWE Germany" />
              </div>
              <div>
                <div className="vp-readout-label" style={{ marginBottom:5 }}>DMA Account ID *</div>
                <MInput value={accountId} onChange={setAccountId} placeholder="e.g. 83" type="number" />
              </div>
            </>
          )}

          <div>
            <div className="vp-readout-label" style={{ marginBottom:5 }}>Timezone</div>
            <select className="vp-select" value={tz} onChange={e => setTz(e.target.value)}>
              {TZ_OPTIONS.map(z => <option key={z} value={z}>{z}</option>)}
            </select>
          </div>

          <div>
            <div className="vp-readout-label" style={{ marginBottom:8 }}>Requires JIRA</div>
            <div style={{ display:'flex', gap:12 }}>
              {[true, false].map(v => (
                <label key={String(v)} style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:13, color:T.fg[2] }}>
                  <input type="radio" checked={reqJira === v} onChange={() => setReqJira(v)} style={{ accentColor: T.brand.base }} />
                  {v ? 'Yes' : 'No'}
                </label>
              ))}
            </div>
          </div>

          <div>
            <div className="vp-readout-label" style={{ marginBottom:5 }}>Aliases <span style={{ textTransform:'none', letterSpacing:0, fontSize:10, color:T.fg[4] }}>(one per line)</span></div>
            <textarea
              value={aliasRaw}
              onChange={e => setAliasRaw(e.target.value)}
              placeholder={'e.g. REWE GmbH\nREWE AG'}
              rows={3}
              style={{ width:'100%', padding:'10px 12px', border:`1.5px solid ${T.border.input}`, borderRadius:8, fontSize:13, fontFamily:T.font.sans, color:T.fg[1], background:'#fff', outline:'none', resize:'vertical', boxSizing:'border-box' }}
            />
          </div>

          {!isNew && client?.account_id && (
            <div>
              <div className="vp-readout-label" style={{ marginBottom:4 }}>Account ID <span style={{ color:T.fg[4], textTransform:'none', letterSpacing:0 }}>(read-only)</span></div>
              <div style={{ fontFamily:T.font.mono, fontSize:13, color:T.fg[4], padding:'9px 12px', background:T.bg.surface2, borderRadius:8, border:`1px solid ${T.border.base}` }}>{client.account_id}</div>
            </div>
          )}

          <MButton variant="primary" fullWidth onClick={save} disabled={saving} style={{ marginTop:4 }}>
            {saving ? <><Spinner /> Saving…</> : isNew ? '＋ Create Client' : '✓ Save Changes'}
          </MButton>
        </div>
      </div>
    </div>
  );
}

function ClientConfigScreen({ token }) {
  const [clients,    setClients]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [error,      setError]      = useState('');
  const [search,     setSearch]     = useState('');
  const [showModal,  setShowModal]  = useState(false);
  const [editClient, setEditClient] = useState(null); // null = new
  const [deleting,   setDeleting]   = useState('');
  const [toast,      setToast]      = useState('');

  async function load() {
    setLoading(true);
    try {
      const data = await mapi('GET', '/api/config/clients', null, token);
      setClients(data);
      setError('');
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  async function deleteClient(name) {
    if (!window.confirm(`Delete custom client "${name}"? This cannot be undone.`)) return;
    setDeleting(name);
    try {
      await mapi('DELETE', `/api/config/clients/${encodeURIComponent(name)}`, null, token);
      setToast(`"${name}" deleted`);
      setTimeout(() => setToast(''), 3000);
      load();
    } catch(e) { setError(e.message); }
    finally { setDeleting(''); }
  }

  const filtered = clients.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Header */}
      <div style={{ padding:'14px 16px 10px', background:T.bg.surface1, borderBottom:`1px solid ${T.border.base}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
          <div style={{ fontSize:15, fontWeight:700, color:T.fg[1], flex:1 }}>Client Config</div>
          <MButton variant="primary" size="sm" onClick={() => { setEditClient(null); setShowModal(true); }}>＋ New Client</MButton>
        </div>
        <MInput value={search} onChange={setSearch} placeholder="Search clients…" icon={
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        } />
      </div>

      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', bottom:80, left:'50%', transform:'translateX(-50%)', zIndex:9999, pointerEvents:'none', background:T.ok.base, color:'#fff', fontFamily:T.font.sans, fontSize:13, fontWeight:700, padding:'10px 22px', borderRadius:999, boxShadow:T.ok.glow, animation:'vp-fade-in .18s ease both', whiteSpace:'nowrap' }}>
          ✓ {toast}
        </div>
      )}

      {/* List */}
      <div style={{ flex:1, minHeight:0, overflowY:'auto', padding:'12px 16px 24px' }}>
        <ErrorBox msg={error} onDismiss={() => setError('')} />
        {loading ? <SpinnerLg /> : filtered.length === 0 ? (
          <div style={{ textAlign:'center', color:T.fg[4], padding:40, fontSize:13 }}>
            {search ? 'No clients match.' : 'No clients found.'}
          </div>
        ) : filtered.map(c => (
          <div key={c.name} className="vp-card" style={{ marginBottom:8, padding:'12px 14px' }}>
            <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:T.fg[1] }}>{c.name}</span>
                  {c.is_custom && <MBadge kind="brand">custom</MBadge>}
                  {!c.requires_jira && <MBadge kind="neutral">no jira</MBadge>}
                </div>
                <div style={{ fontSize:11, fontFamily:T.font.mono, color:T.fg[3] }}>
                  {c.account_id ? `ID: ${c.account_id}` : 'No account ID'} · {c.timezone_name}
                </div>
                {c.aliases?.length > 0 && (
                  <div style={{ marginTop:5, display:'flex', flexWrap:'wrap', gap:4 }}>
                    {c.aliases.slice(0,3).map((a,i) => <MTag key={i} kind="neutral">{a}</MTag>)}
                    {c.aliases.length > 3 && <MTag kind="neutral">+{c.aliases.length - 3}</MTag>}
                  </div>
                )}
              </div>
              <div style={{ display:'flex', gap:6, flexShrink:0 }}>
                <MButton variant="soft" size="sm" onClick={() => { setEditClient(c); setShowModal(true); }}>Edit</MButton>
                {c.is_custom && (
                  <MButton variant="danger" size="sm" disabled={deleting === c.name} onClick={() => deleteClient(c.name)}>
                    {deleting === c.name ? <Spinner /> : '✕'}
                  </MButton>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Modal */}
      {showModal && (
        <ClientFormModal
          client={editClient}
          token={token}
          onSaved={() => { load(); setToast(editClient ? `"${editClient.name}" saved` : 'Client created'); setTimeout(() => setToast(''), 3000); }}
          onClose={() => setShowModal(false)}
        />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE APP ROOT
   ═════════════════════════════════════════════════════════════════════════ */
function MobileApp() {
  // Share the same localStorage keys as the desktop app (vp_token + vp_name)
  // so switching between / and /mobile never requires re-login.
  const [auth, setAuth] = useState(() => {
    const tok  = localStorage.getItem('vp_token') || '';
    const name = localStorage.getItem('vp_name')  || '';
    return tok ? { token: tok, name } : null;
  });
  const [activeTab, setActiveTab] = useState('validator');
  const [openTicket, setOpenTicket] = useState(null);

  function handleLogin(authData) {
    localStorage.setItem('vp_token', authData.token);
    localStorage.setItem('vp_name',  authData.name);
    setAuth(authData);
  }

  function handleSignOut() {
    localStorage.removeItem('vp_token');
    localStorage.removeItem('vp_name');
    setAuth(null);
    setOpenTicket(null);
    setActiveTab('validator');
  }

  function handleOpenTicket(ticket) {
    setOpenTicket(ticket);
  }

  function handleBack() {
    setOpenTicket(null);
  }

  function handleTabChange(tab) {
    setActiveTab(tab);
    setOpenTicket(null);
  }

  const tabs = [
    { id: 'validator', label: 'Validator', Icon: IconValidator },
    { id: 'orphans',   label: 'Orphans',   Icon: IconOrphans   },
    { id: 'dashboard', label: 'Dashboard', Icon: IconDashboard  },
    { id: 'config',    label: 'Config',    Icon: IconConfig     },
    { id: 'profile',   label: 'Profile',   Icon: IconProfile    },
  ];

  if (!auth) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100dvh', overflow: 'hidden', background: T.bg.app }}>
      {/* Main content */}
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {activeTab === 'validator' && (
          openTicket
            ? <ValidatorScreen key={openTicket.key} ticket={openTicket} token={auth.token} userName={auth.name} onBack={handleBack} />
            : <QueueScreen token={auth.token} onOpenTicket={handleOpenTicket} />
        )}
        {activeTab === 'orphans' && (
          <OrphansScreen token={auth.token} />
        )}
        {activeTab === 'dashboard' && (
          <DashboardScreen token={auth.token} />
        )}
        {activeTab === 'config' && (
          <ClientConfigScreen token={auth.token} />
        )}
        {activeTab === 'profile' && (
          <ProfileScreen user={auth} token={auth.token} onSignOut={handleSignOut} />
        )}
      </div>

      {/* Bottom tab bar */}
      <div className="vp-tab-bar">
        {tabs.map(({ id, label, Icon }) => (
          <button
            key={id}
            className={`vp-tab-btn${activeTab === id ? ' active' : ''}`}
            onClick={() => handleTabChange(id)}
          >
            <Icon active={activeTab === id} />
            {label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp />);
</script>
</body>
</html>
