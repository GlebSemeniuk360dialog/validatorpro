/** Editor for a single filter set (list of rule objects + optional when conditions) */
function FilterRulesEditor({ setName, entry, onChangeEntry, onDeleteSet }) {
  const [open, setOpen] = useState(false);
  // entry can be a plain array OR {rules:[...], when:{...}}
  const isDict = entry && !Array.isArray(entry) && typeof entry === 'object';
  const rules = isDict ? (entry.rules || []) : (Array.isArray(entry) ? entry : []);
  const when  = isDict ? (entry.when  || {}) : {};

  function setRules(r) {
    if (isDict || Object.keys(when).length > 0) onChangeEntry({rules: r, when});
    else onChangeEntry(r);
  }
  function setWhen(w) {
    // If all when keys removed, collapse back to plain list
    const cleaned = Object.fromEntries(Object.entries(w).filter(([,v])=>v!==''&&v!==null&&v!==undefined));
    if (Object.keys(cleaned).length === 0) onChangeEntry(rules);
    else onChangeEntry({rules, when: cleaned});
  }

  function addRule() { setRules([...rules, { type:'exact', value:'' }]); setOpen(true); }
  function addScheduledDayRule() { setRules([...rules, { type:'scheduled_day', mode:'exclude', value:'wednesday' }]); setOpen(true); }

  const whenKeys = ['is_carousel','day_of_week','request_type','segment'];
  const condSummary = Object.keys(when).length > 0
    ? Object.entries(when).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(', ')
    : 'no conditions (always applies)';

  return (
    <div style={{ border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden', marginBottom:8 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px', background:t.bg.surface2, cursor:'pointer' }} onClick={()=>setOpen(o=>!o)}>
        <div>
          <span style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[2] }}>{setName} <span style={{ color:t.fg[4] }}>({rules.length} rule{rules.length!==1?'s':''})</span></span>
          <div style={{ fontSize:10, color:t.fg[4], fontFamily:t.font.mono, marginTop:2 }}>when: {condSummary}</div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <Button variant="danger" onClick={e=>{e.stopPropagation();onDeleteSet();}} style={{ fontSize:11, padding:'3px 9px' }}>Delete set</Button>
          <span style={{ color:t.fg[3], fontSize:14 }}>{open?'▲':'▼'}</span>
        </div>
      </div>
      {open&&(
        <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
          {/* When conditions */}
          <div style={{ background:t.bg.surface3||t.bg.surface2, border:`1px solid ${t.border.base}`, borderRadius:4, padding:'10px 12px' }}>
            <div style={{ fontSize:11, fontFamily:t.font.mono, color:t.fg[3], marginBottom:8 }}>⚡ Conditions (when) — leave blank to always apply</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              <div>
                <label style={{ fontSize:11, color:t.fg[4], display:'block', marginBottom:3 }}>is_carousel</label>
                <Select value={when.is_carousel===true?'true':when.is_carousel===false?'false':''}
                  onChange={v=>setWhen({...when, is_carousel: v===''?undefined:v==='true'})}
                  options={[{value:'',label:'— any —'},{value:'true',label:'Carousel only'},{value:'false',label:'Non-carousel only'}]}
                  style={{ fontSize:12 }} />
              </div>
              <div>
                <label style={{ fontSize:11, color:t.fg[4], display:'block', marginBottom:3 }}>day_of_week</label>
                <Select value={when.day_of_week||''}
                  onChange={v=>setWhen({...when, day_of_week: v||undefined})}
                  options={[{value:'',label:'— any day —'},...DAYS_OF_WEEK.map(d=>({value:d,label:d.charAt(0).toUpperCase()+d.slice(1)}))]}
                  style={{ fontSize:12 }} />
              </div>
              <div>
                <label style={{ fontSize:11, color:t.fg[4], display:'block', marginBottom:3 }}>request_type (substring)</label>
                <Input value={when.request_type||''} onChange={v=>setWhen({...when, request_type:v||undefined})} style={{ fontSize:12, fontFamily:t.font.mono }} placeholder="e.g. carousel" />
              </div>
              <div>
                <label style={{ fontSize:11, color:t.fg[4], display:'block', marginBottom:3 }}>segment (substring)</label>
                <Input value={when.segment||''} onChange={v=>setWhen({...when, segment:v||undefined})} style={{ fontSize:12, fontFamily:t.font.mono }} placeholder="e.g. Regular" />
              </div>
            </div>
          </div>
          {/* Rules */}
          {rules.map((rule,i)=>(
            <FilterRuleRow key={i} rule={rule}
              onChange={r=>{ const next=[...rules]; next[i]=r; setRules(next); }}
              onDelete={()=>setRules(rules.filter((_,j)=>j!==i))} />
          ))}
          <div style={{ display:'flex', gap:8 }}>
            <Button variant="ghost" onClick={addRule} style={{ fontSize:12 }}>+ Add tag rule</Button>
            <Button variant="ghost" onClick={addScheduledDayRule} style={{ fontSize:12 }}>📅 + Scheduled day rule</Button>
          </div>
        </div>
      )}
    </div>
  );
}

/** Editor for the full filters dict: {setName: [rules] or {rules,when}} */
function FilterSetsEditor({ filters, onChange }) {
  const [newSetName, setNewSetName] = useState('');
  const setNames = Object.keys(filters);
  function addSet() {
    const n = newSetName.trim();
    if (!n || n in filters) return;
    onChange({ ...filters, [n]: [] });
    setNewSetName('');
  }
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
      {setNames.length===0&&<span style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[4] }}>no filter sets defined</span>}
      {setNames.map(sn=>(
        <FilterRulesEditor key={sn} setName={sn} entry={filters[sn]}
          onChangeEntry={entry=>onChange({...filters,[sn]:entry})}
          onDeleteSet={()=>{ const f={...filters}; delete f[sn]; onChange(f); }} />
      ))}
      <div style={{ display:'flex', gap:8, marginTop:4 }}>
        <Input value={newSetName} onChange={setNewSetName} placeholder="new filter set name…" style={{ flex:1 }}
          onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();addSet();} }} />
        <Button variant="ghost" onClick={addSet} style={{ whiteSpace:'nowrap', flexShrink:0 }}>+ Add set</Button>
      </div>
    </div>
  );
}

/** Full config editor panel for one client */
function ClientEditPanel({ client, token, onSaved }) {
  const [tz,       setTz]       = useState(client.timezone_name || 'Europe/Berlin');
  const [reqJira,  setReqJira]  = useState(client.requires_jira !== false);
  const [aliases,  setAliases]  = useState(client.aliases  || []);
  const [filters,  setFilters]  = useState(client.filters  || {});
  const [mappings, setMappings] = useState(client.mappings || {});
  const [mappingsRaw, setMappingsRaw] = useState(JSON.stringify(client.mappings||{}, null, 2));
  const [mappingsErr, setMappingsErr] = useState('');
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const [err,    setErr]    = useState('');

  const TZ_OPTIONS = [
    'Europe/Berlin','Europe/London','Europe/Paris','Europe/Warsaw','Europe/Vienna',
    'Europe/Zurich','Europe/Amsterdam','Europe/Brussels','Europe/Stockholm',
    'America/New_York','America/Chicago','America/Los_Angeles',
    'Asia/Dubai','Asia/Singapore','UTC',
  ];

  function onMappingsChange(raw) {
    setMappingsRaw(raw);
    try { setMappings(JSON.parse(raw)); setMappingsErr(''); }
    catch(e) { setMappingsErr('Invalid JSON: '+e.message); }
  }

  async function save() {
    if (mappingsErr) { setErr('Fix mappings JSON first'); return; }
    setSaving(true); setErr(''); setSaved(false);
    try {
      await api('PUT', '/api/config/clients/'+encodeURIComponent(client.name),
        { timezone_name:tz, requires_jira:reqJira, filters, aliases, mappings }, token);
      setSaved(true);
      setTimeout(()=>setSaved(false), 2500);
      if (onSaved) onSaved();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      {/* General */}
      <div>
        <SectionHeader>General</SectionHeader>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
          <div>
            <Overline style={{ marginBottom:6 }}>— timezone</Overline>
            <Select value={tz} onChange={setTz}
              options={TZ_OPTIONS.map(z=>({value:z,label:z}))} />
          </div>
          <div>
            <Overline style={{ marginBottom:6 }}>— requires jira</Overline>
            <div style={{ display:'flex', gap:10, marginTop:4 }}>
              {[true,false].map(v=>(
                <label key={String(v)} style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontFamily:t.font.sans, fontSize:13, color:t.fg[2] }}>
                  <input type="radio" checked={reqJira===v} onChange={()=>setReqJira(v)}
                    style={{ accentColor:t.brand.base }} />
                  {v?'Yes':'No'}
                </label>
              ))}
            </div>
          </div>
        </div>
        <div style={{ marginTop:12 }}>
          <Overline style={{ marginBottom:6 }}>— account id <span style={{ color:t.fg[4], textTransform:'none', letterSpacing:0, fontSize:11 }}>(read-only)</span></Overline>
          <div style={{ fontFamily:t.font.mono, fontSize:13, color:t.fg[4], background:t.bg.surface2, border:`1px solid ${t.border.input}`, borderRadius:4, padding:'9px 12px', opacity:.7 }}>
            {client.account_id || '—'}
          </div>
        </div>
      </div>

      {/* Aliases */}
      <div>
        <SectionHeader>Aliases</SectionHeader>
        <AliasEditor aliases={aliases} onChange={setAliases} />
      </div>

      {/* Filter sets */}
      <div>
        <SectionHeader>Filter Sets</SectionHeader>
        <FilterSetsEditor filters={filters} onChange={setFilters} />
      </div>

      {/* Mappings */}
      <div>
        <SectionHeader>Segment Mappings</SectionHeader>
        <Overline style={{ marginBottom:8, color:t.fg[4] }}>— raw JSON: {`{segment_key: {label: tag}}`}</Overline>
        <textarea value={mappingsRaw} onChange={e=>onMappingsChange(e.target.value)}
          rows={8} spellCheck={false}
          style={{ width:'100%', background:t.bg.surface2, border:`1px solid ${mappingsErr?t.danger.base:t.border.input}`, color:t.fg[1], borderRadius:4, padding:'10px 12px', fontFamily:t.font.mono, fontSize:12, resize:'vertical', outline:'none', boxSizing:'border-box' }} />
        {mappingsErr&&<div style={{ color:t.danger.base, fontSize:12, marginTop:4 }}>{mappingsErr}</div>}
      </div>

      {/* Save bar */}
      <div style={{ display:'flex', alignItems:'center', gap:12, paddingTop:4 }}>
        <Button onClick={save} disabled={saving||!!mappingsErr}>
          {saving?'Saving…':'Save changes'}
        </Button>
        {saved&&<Badge kind="ok">✓ Saved</Badge>}
        {err&&<span style={{ color:t.danger.base, fontSize:13 }}>{err}</span>}
      </div>
    </div>
  );
}

/** Main Config tab component */
function ConfigEditor({ token }) {
  const [clients,  setClients]  = useState([]);
  const [selected, setSelected] = useState(null); // null = new client form
  const [loading,  setLoading]  = useState(true);
  const [err,      setErr]      = useState('');
  const [search,   setSearch]   = useState('');
  const [showNew,  setShowNew]  = useState(false);

  async function load(selectName) {
    try {
      const data = await api('GET', '/api/config/clients', null, token);
      setClients(data);
      if (selectName) setSelected(selectName);
      else if (!selected && data.length) setSelected(data[0].name);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  useEffect(()=>{ load(); }, []);

  async function deleteClient(name) {
    if (!window.confirm(`Delete custom client "${name}"? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/api/config/clients/${encodeURIComponent(name)}`, null, token);
      setSelected(null);
      load();
    } catch(e) { setErr(e.message); }
  }

  const filtered = clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const activeClient = clients.find(c=>c.name===selected);

  if (loading) return <div style={{ padding:40, fontFamily:t.font.mono, color:t.fg[3] }}>Loading configs…</div>;
  if (err) return <div style={{ padding:40, color:t.danger.base }}>{err}</div>;

  return (
    <div style={{ display:'flex', height:'calc(100vh - 110px)', overflow:'hidden' }}>
      {/* Client list sidebar */}
      <div style={{ width:230, flexShrink:0, borderRight:`1px solid ${t.border.base}`, overflowY:'auto', display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'12px 14px', borderBottom:`1px solid ${t.border.base}`, display:'flex', flexDirection:'column', gap:8 }}>
          <Input value={search} onChange={setSearch} placeholder="search clients…" style={{ fontSize:12 }} />
          <button onClick={()=>{ setShowNew(true); setSelected(null); }}
            style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, width:'100%', padding:'7px 0', border:`1.5px dashed ${t.brand.base}`, borderRadius:6, background:t.brand.soft, color:t.brand.text, fontFamily:t.font.sans, fontSize:12, fontWeight:600, cursor:'pointer' }}>
            ＋ New Client
          </button>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          {filtered.map(c=>(
            <div key={c.name} onClick={()=>{ setSelected(c.name); setShowNew(false); }}
              style={{ padding:'10px 14px', cursor:'pointer', fontSize:13, fontFamily:t.font.sans,
                background: selected===c.name && !showNew ? t.bg.surface2 : 'transparent',
                borderLeft: selected===c.name && !showNew ? `3px solid ${t.brand.base}` : '3px solid transparent',
                color: selected===c.name && !showNew ? t.fg[1] : t.fg[3],
                borderBottom:`1px solid ${t.border.base}`,
                display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ flex:1 }}>{c.name}</span>
              {c.is_custom && <span style={{ fontSize:9, fontFamily:t.font.mono, color:t.brand.text, background:t.brand.soft, padding:'1px 5px', borderRadius:3 }}>custom</span>}
            </div>
          ))}
        </div>
      </div>

      {/* Editor panel */}
      <div style={{ flex:1, overflowY:'auto', padding:'24px 32px' }}>
        {showNew ? (
          <NewClientPanel token={token} onCancel={()=>setShowNew(false)} onSaved={name=>{ setShowNew(false); load(name); }} />
        ) : activeClient ? (
          <div>
            <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:20 }}>
              <div style={{ fontFamily:t.font.display, fontSize:20, fontWeight:600, color:t.fg[1] }}>{activeClient.name}</div>
              {activeClient.is_custom && <Badge kind="brand">custom</Badge>}
              <Badge kind="info">{activeClient.requires_jira?'jira required':'no jira'}</Badge>
              <div style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[4] }}>updated {activeClient.updated_at?.slice(0,16)}</div>
              {activeClient.is_custom && (
                <button onClick={()=>deleteClient(activeClient.name)}
                  style={{ marginLeft:'auto', padding:'4px 10px', border:`1px solid ${t.danger.base}`, borderRadius:4, background:'none', color:t.danger.base, fontSize:12, cursor:'pointer', fontFamily:t.font.sans }}>
                  Delete
                </button>
              )}
            </div>
            <ClientEditPanel key={activeClient.name} client={activeClient} token={token} onSaved={()=>load()} />
          </div>
        ) : (
          <div style={{ color:t.fg[4], fontFamily:t.font.mono, fontSize:13 }}>Select a client to edit or create a new one</div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ROOT APP
   ═════════════════════════════════════════════════════════════════════════ */
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('vp_token') || '');
  const [userName, setUserName] = useState(() => localStorage.getItem('vp_name') || '');
  const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('vp_admin') === '1');
  const [mainTab, setMainTab] = useState('Validator');
  const [currentTicket, setCurrentTicket] = useState(null);
  const [queueRows, setQueueRows] = useState([]);
  const [queueLoading, setQueueLoading] = useState(false);
  const [queueError, setQueueError] = useState('');
  const [clients, setClients] = useState([]);
  const [gsheetStatus, setGsheetStatus] = useState('ok');
  const [cacheKey, setCacheKey] = useState(0);  // bump to clear client cache
  const [bulkResult, setBulkResult] = useState(null);
  const [slackStatus, setSlackStatus] = useState('unknown');
  const [schedulerStatus, setSchedulerStatus] = useState(null);

  // Read deep-link params from URL once on mount (populated by Slack notifications)
  const [deepLinkParams] = useState(() => {
    const p = new URLSearchParams(window.location.search);
    return { ticket: p.get('ticket') || '', sendout: p.get('sendout') || '', client: p.get('client') || '' };
  });
  const _deepLinkHandled = React.useRef(false);

  const signIn = (tok, name, admin) => {
    localStorage.setItem('vp_token', tok);
    localStorage.setItem('vp_name', name);
    localStorage.setItem('vp_admin', admin ? '1' : '0');
    setToken(tok); setUserName(name); setIsAdmin(!!admin);
    fetchQueue(tok);
    fetchClients(tok);
    fetchSlackStatus(tok);
    fetchSchedulerStatus(tok);
  };

  const signOut = async () => {
    try { await api('POST', '/api/auth/logout', null, token); } catch(_){}
    localStorage.removeItem('vp_token'); localStorage.removeItem('vp_name'); localStorage.removeItem('vp_admin');
    setToken(''); setUserName(''); setIsAdmin(false); setQueueRows([]); setCurrentTicket(null);
  };

  const fetchQueue = async (tok) => {
    setQueueLoading(true);
    setQueueError('');
    try {
      const data = await api('GET', '/api/queue', null, tok||token);
      setQueueRows(data);
    } catch(e) {
      console.error(e);
      setQueueError(e.message || 'Unknown error');
    } finally {
      setQueueLoading(false);
    }
  };

  const fetchClients = async (tok) => {
    try {
      const data = await api('GET', '/api/clients', null, tok||token);
      setClients(data);
    } catch(_){}
  };

  const refreshGsheet = async () => {
    setGsheetStatus('loading');
    try { await api('POST', '/api/gsheet/refresh', null, token); setGsheetStatus('ok'); }
    catch(_) { setGsheetStatus('error'); }
  };

  const clearCache = () => { setCacheKey(k=>k+1); setCurrentTicket(null); setQueueRows([]); };

  const fetchSlackStatus = async (tok) => {
    try {
      const data = await api('GET', '/api/slack/status', null, tok||token);
      setSlackStatus(data.configured ? 'ok' : 'none');
    } catch(_) { setSlackStatus('unknown'); }
  };

  const fetchSchedulerStatus = async (tok) => {
    try {
      const data = await api('GET', '/api/scheduler/status', null, tok||token);
      setSchedulerStatus(data);
    } catch(_) { setSchedulerStatus(null); }
  };

  const testSlack = async () => {
    try {
      await api('POST', '/api/slack/test', null, token);
    } catch(e) { alert('Slack test failed: ' + e.message); }
  };

  // Load queue on mount if already logged in — also validate the stored token
  useEffect(()=>{
    if (!token) return;
    // Ping the server to check the token is still valid
    api('GET', '/api/clients', null, token)
      .then(data => { setClients(data); fetchQueue(); fetchSlackStatus(); fetchSchedulerStatus(); })
      .catch(() => {
        // Token rejected (server restarted, session expired) — force re-login
        localStorage.removeItem('vp_token'); localStorage.removeItem('vp_name');
        setToken(''); setUserName('');
      });
  }, []);

  // Once the queue is loaded, auto-navigate if a deep-link ?ticket= param is present
  useEffect(() => {
    if (_deepLinkHandled.current || !deepLinkParams.ticket || queueRows.length === 0) return;
    _deepLinkHandled.current = true;
    const found = queueRows.find(r => r.key === deepLinkParams.ticket);
    if (found) {
      setCurrentTicket(found);
    } else if (deepLinkParams.client) {
      // Ticket not in current queue — create a stub from URL params so the panel can still load
      setCurrentTicket({ key: deepLinkParams.ticket, client: deepLinkParams.client, date: '', summary: '(opened from link)' });
    }
  }, [queueRows]);

  if (!token) return <Login onSignIn={signIn} />;

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh', background:t.bg.app }}>
      <Topbar title="Validator Pro" user={userName} />
      <MainTabs active={mainTab} onChange={tab=>{ setMainTab(tab); setCurrentTicket(null); }} isAdmin={isAdmin} />
      <div style={{ display:'flex', flex:1 }}>
        <Sidebar user={userName} onSignOut={signOut} onRefreshSheet={refreshGsheet} onClearCache={clearCache} gsheetStatus={gsheetStatus} slackStatus={slackStatus} onTestSlack={testSlack} schedulerStatus={schedulerStatus} />
        <main style={{ flex:1, padding:'24px 28px', overflow:'auto', minWidth:0 }}>

          {mainTab==='Validator'&&(
            currentTicket
              ? <TicketPanel key={`${cacheKey}-${currentTicket.key}`} ticket={currentTicket} clients={clients} token={token} onBack={()=>setCurrentTicket(null)} initialSendout={currentTicket.key === deepLinkParams.ticket ? deepLinkParams.sendout : ''} />
              : bulkResult
                ? <BulkResultPanel results={bulkResult.results} mode={bulkResult.mode} onBack={()=>setBulkResult(null)} />
                : <Queue rows={queueRows} onLoad={row=>{setCurrentTicket(row);}} loading={queueLoading} onRefresh={()=>fetchQueue()} token={token} onBulkResult={(data,mode)=>setBulkResult({results:data,mode})} fetchError={queueError} />
          )}

          {mainTab==='Dashboard'&&<Dashboard token={token} />}
          {mainTab==='Sendout Form'&&<SendoutForm token={token} clients={clients} />}
          {mainTab==='AI Examples'&&<ExamplesManager token={token} />}
          {mainTab==='Config'&&<ConfigEditor token={token} />}
          {mainTab==='Users'&&isAdmin&&<UsersPanel token={token} />}

        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
