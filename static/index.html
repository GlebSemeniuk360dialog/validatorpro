function SFInput({ value, onChange, placeholder, type, disabled, mono, style }) {
  const inp = useRef(null);
  return (
    <input ref={inp} type={type||'text'} value={value||''} disabled={disabled}
      onChange={e => onChange?.(e.target.value)}
      placeholder={placeholder}
      style={{
        width:'100%', height:36, padding:'0 12px',
        fontFamily: mono ? t.font.mono : t.font.sans, fontSize:13,
        color:t.fg[1], background: disabled ? t.bg.surface2 : t.bg.surface1,
        border:`1px solid ${t.border.input}`, borderRadius:4,
        outline:'none', boxSizing:'border-box',
        transition:'border-color 120ms, box-shadow 120ms',
        cursor: disabled ? 'not-allowed' : 'text',
        ...style,
      }}
      onFocus={e => { e.target.style.borderColor=t.brand.base; e.target.style.boxShadow=`0 0 0 3px ${t.brand.ring}`; }}
      onBlur={e  => { e.target.style.borderColor=t.border.input; e.target.style.boxShadow='none'; }}
    />
  );
}

function SFSelect({ value, onChange, options, placeholder, disabled, mono }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = e => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const chosen = options?.find(o => o.value === value);
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button type="button" disabled={disabled} onClick={() => !disabled && setOpen(o => !o)}
        style={{
          width:'100%', height:36, padding:'0 32px 0 12px', textAlign:'left',
          background: disabled ? t.bg.surface2 : t.bg.surface1,
          border:`1px solid ${open ? t.brand.base : t.border.input}`,
          boxShadow: open ? `0 0 0 3px ${t.brand.ring}` : 'none',
          borderRadius:4, fontFamily: mono ? t.font.mono : t.font.sans, fontSize:13,
          color: chosen ? t.fg[1] : t.fg[4],
          cursor: disabled ? 'not-allowed' : 'pointer',
          transition:'border-color 120ms, box-shadow 120ms',
        }}>
        {chosen?.label || placeholder}
        <svg width="10" height="10" viewBox="0 0 12 12" style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)' }}>
          <path d="M2 4l4 4 4-4" stroke={t.fg[3]} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:80,
          background:t.bg.surface1, border:`1px solid ${t.border.input}`, borderRadius:4,
          boxShadow:'0 8px 24px rgba(15,23,42,0.10)', maxHeight:240, overflowY:'auto',
        }}>
          {options?.map(o => (
            <div key={o.value} onClick={() => { onChange?.(o.value); setOpen(false); }}
              style={{ padding:'8px 12px', fontSize:13, cursor:'pointer', color:t.fg[1],
                fontFamily: mono ? t.font.mono : t.font.sans,
                background: o.value===value ? t.brand.soft : t.bg.surface1,
              }}
              onMouseEnter={e => { if (o.value!==value) e.currentTarget.style.background=t.bg.surface3; }}
              onMouseLeave={e => { if (o.value!==value) e.currentTarget.style.background=t.bg.surface1; }}>
              {o.label}
              {o.sub && <div style={{ fontSize:11, color:t.fg[3], marginTop:2, fontFamily:t.font.mono }}>{o.sub}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SFBtn({ children, primary, ghost, small, onClick, disabled, glyph, style }) {
  const base = {
    height: small?28:36, padding: small?'0 10px':'0 16px',
    fontFamily:t.font.sans, fontSize: small?12:13, fontWeight:500,
    borderRadius:4, border:'1px solid transparent',
    cursor: disabled?'not-allowed':'pointer', opacity: disabled?0.5:1,
    display:'inline-flex', alignItems:'center', gap:6,
    transition:'background 140ms, border-color 140ms, color 140ms',
    ...style,
  };
  if (primary)    Object.assign(base, { background:t.brand.base, color:'#fff', border:`1px solid ${t.brand.base}` });
  else if (ghost) Object.assign(base, { background:'transparent', color:t.fg[3], border:`1px solid ${t.border.input}` });
  else            Object.assign(base, { background:t.bg.surface1, color:t.fg[2], border:`1px solid ${t.border.input}` });
  return (
    <button type="button" onClick={onClick} disabled={disabled} style={base}
      onMouseEnter={e => {
        if (disabled) return;
        if (primary) { e.currentTarget.style.background=t.brand.hover; }
        else { e.currentTarget.style.borderColor=t.brand.base; e.currentTarget.style.color=t.brand.text; }
      }}
      onMouseLeave={e => {
        if (primary) { e.currentTarget.style.background=t.brand.base; }
        else { e.currentTarget.style.borderColor=t.border.input; e.currentTarget.style.color=ghost?t.fg[3]:t.fg[2]; }
      }}>
      {glyph && <span style={{ fontFamily:t.font.mono, fontSize:small?10:12 }}>{glyph}</span>}
      {children}
    </button>
  );
}

function SFTagChip({ children, tone, onRemove }) {
  const pal = {
    include: { bg:'#00d4aa18', fg:'#0a8080', border:'#0fb5b540' },
    exclude: { bg:'#ff4d6d18', fg:'#9F1239', border:'#dc262640' },
  }[tone] || { bg:t.bg.surface3, fg:t.fg[2], border:t.border.base };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6,
      padding: onRemove ? '2px 4px 2px 10px' : '3px 10px',
      background:pal.bg, color:pal.fg, border:`1px solid ${pal.border}`,
      borderRadius:999, fontFamily:t.font.mono, fontSize:11, fontWeight:500, lineHeight:1.4 }}>
      {children}
      {onRemove && (
        <button onClick={onRemove} style={{ width:14, height:14, border:'none', background:'transparent',
          color:pal.fg, opacity:0.55, cursor:'pointer', padding:0,
          display:'inline-flex', alignItems:'center', justifyContent:'center', borderRadius:'50%' }}>
          <svg width="8" height="8" viewBox="0 0 9 9"><path d="M1 1l7 7M8 1l-7 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        </button>
      )}
    </span>
  );
}

function SFTagInput({ tags, setTags, placeholder, tone }) {
  const [draft, setDraft] = useState('');
  const [focused, setFocused] = useState(false);
  const commit = () => {
    const v = draft.trim().replace(/,$/, '');
    if (v && !tags.includes(v)) setTags([...tags, v]);
    setDraft('');
  };
  return (
    <div style={{
      minHeight:80, padding:7,
      background:t.bg.surface1,
      border:`1px solid ${focused ? t.brand.base : t.border.input}`,
      boxShadow: focused ? `0 0 0 3px ${t.brand.ring}` : 'none',
      borderRadius:4, display:'flex', flexWrap:'wrap', gap:5, alignContent:'flex-start',
      transition:'border-color 120ms, box-shadow 120ms', cursor:'text',
    }} onClick={e => e.currentTarget.querySelector('input')?.focus()}>
      {tags.map(tag => (
        <SFTagChip key={tag} tone={tone} onRemove={() => setTags(tags.filter(x => x!==tag))}>{tag}</SFTagChip>
      ))}
      <input value={draft}
        onChange={e => {
          const v = e.target.value;
          if (v.endsWith(',')) {
            const x = v.slice(0,-1).trim();
            if (x && !tags.includes(x)) setTags([...tags, x]);
            setDraft('');
          } else setDraft(v);
        }}
        onKeyDown={e => {
          if (e.key==='Enter') { e.preventDefault(); commit(); }
          if (e.key==='Backspace' && !draft && tags.length) setTags(tags.slice(0,-1));
        }}
        onFocus={() => setFocused(true)}
        onBlur={() => { setFocused(false); commit(); }}
        placeholder={tags.length ? '' : placeholder}
        style={{ flex:1, minWidth:120, border:'none', outline:'none',
          fontFamily:t.font.mono, fontSize:12, color:t.fg[1],
          background:'transparent', padding:'3px 6px' }}
      />
    </div>
  );
}

function SFSectionHeader({ glyph, title, subtitle, accent }) {
  return (
    <div style={{ display:'flex', alignItems:'baseline', gap:12,
      padding:'0 0 10px', borderBottom:`1px solid ${t.border.base}`, marginBottom:14 }}>
      <span style={{ fontFamily:t.font.mono, fontSize:11, fontWeight:600,
        color: accent ? t.brand.text : t.fg[3], letterSpacing:'.08em' }}>{glyph}</span>
      <span style={{ fontFamily:t.font.display, fontSize:14, fontWeight:600, color:t.fg[1] }}>{title}</span>
      {subtitle && <span style={{ fontSize:12, color:t.fg[3] }}>{subtitle}</span>}
    </div>
  );
}

function SFRow({ cols, children }) {
  return <div style={{ display:'grid', gridTemplateColumns:cols, gap:14 }}>{children}</div>;
}

function SFField({ children, style }) {
  return <div style={style}>{children}</div>;
}

function SFHint({ children }) {
  return <div style={{ marginTop:5, fontSize:11, color:t.fg[3], fontFamily:t.font.sans, lineHeight:1.5 }}>{children}</div>;
}

/* ══════════════════════════════════════════════════════════════════════════
   SENDOUT FORM — main component
   ═════════════════════════════════════════════════════════════════════════ */
const SF_EMPTY = {
  client:'', ticket_key:'', sendout_id:'', sendout_name:'', sendout_date:'',
  sendout_time:'', tz:'Europe/Berlin', platform:'', template_type:'', notes:'',
};

function SendoutForm({ token, clients }) {
  const [view, setView]               = useState('list');  // 'list' | 'form'
  const [editId, setEditId]           = useState(null);
  const [entries, setEntries]         = useState([]);
  const [listLoading, setListLoading] = useState(false);
  const [listError, setListError]     = useState('');
  const [filterClient, setFilterClient] = useState('');

  // form state
  const [form, setForm]               = useState(SF_EMPTY);
  const [includeTags, setIncludeTags] = useState([]);
  const [excludeTags, setExcludeTags] = useState([]);
  const [tickets, setTickets]         = useState([]);
  const [ticketsLoading, setTicketsLoading] = useState(false);
  const [sendouts, setSendouts]       = useState([]);
  const [sendoutsLoading, setSendoutsLoading] = useState(false);
  const [enriching, setEnriching]     = useState(false);
  const [saving, setSaving]           = useState(false);
  const [saveError, setSaveError]     = useState('');
  const [activeSection, setActiveSection] = useState('rules');
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const pf = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const splitTags = str => (str||'').split(/[,\n]/).map(s=>s.trim()).filter(Boolean);

  // ── Load entries ──
  const loadEntries = async (cl) => {
    setListLoading(true); setListError('');
    try {
      const qs = cl ? `?client=${encodeURIComponent(cl)}` : '';
      setEntries(await api('GET', `/api/tag-registry${qs}`, null, token));
    } catch(e) { setListError(e.message); }
    finally { setListLoading(false); }
  };
  useEffect(() => { loadEntries(filterClient); }, [filterClient]);

  // ── Load queue once for ticket picker ──
  useEffect(() => {
    setTicketsLoading(true);
    api('GET', '/api/queue', null, token)
      .then(d => setTickets(d)).catch(()=>{}).finally(()=>setTicketsLoading(false));
  }, []);

  // ── Load DMA sendouts when client changes ──
  useEffect(() => {
    if (!form.client) { setSendouts([]); return; }
    setSendoutsLoading(true);
    api('GET', `/api/sendouts/${encodeURIComponent(form.client)}`, null, token)
      .then(d => setSendouts(d)).catch(()=>setSendouts([])).finally(()=>setSendoutsLoading(false));
  }, [form.client]);

  // ── Auto-enrich when ticket is picked ──
  const onTicketChange = async (key) => {
    const tkt = tickets.find(r => r.key === key);
    setForm(f => ({ ...f, ticket_key:key, sendout_date: tkt?.date || f.sendout_date }));
    if (!key || !form.client) return;
    setEnriching(true);
    try {
      const en = await api('POST', '/api/ticket/enrich', {
        client:form.client, ticket_key:key,
        jira_date: tkt?.date||'', jira_summary: tkt?.summary||'',
      }, token);
      setForm(f => ({
        ...f,
        sendout_id:   en.sendout_id   || f.sendout_id,
        sendout_name: en.sendout_name || f.sendout_name,
        sendout_date: en.sendout_date || tkt?.date || f.sendout_date,
      }));
    } catch(_) {}
    finally { setEnriching(false); }
  };

  // ── Open create ──
  const openCreate = () => {
    setForm(SF_EMPTY); setIncludeTags([]); setExcludeTags([]);
    setEditId(null); setSaveError(''); setActiveSection('targeting'); setView('form');
  };

  // ── Open edit ──
  const openEdit = (e) => {
    setForm({
      client:e.client, ticket_key:e.ticket_key||'',
      sendout_id:e.sendout_id, sendout_name:e.sendout_name,
      sendout_date:e.sendout_date, sendout_time:e.sendout_time,
      tz:e.tz, platform:e.platform||'', template_type:e.template_type||'', notes:e.notes,
    });
    setIncludeTags(splitTags(e.include_tags));
    setExcludeTags(splitTags(e.exclude_tags));
    setEditId(e.id); setSaveError(''); setActiveSection('rules'); setView('form');
  };

  // ── Save ──
  const save = async () => {
    if (!form.client) { setSaveError('Client is required'); return; }
    setSaving(true); setSaveError('');
    const body = { ...form, include_tags:includeTags.join(', '), exclude_tags:excludeTags.join(', ') };
    try {
      if (editId) await api('PUT', `/api/tag-registry/${editId}`, body, token);
      else        await api('POST', '/api/tag-registry', body, token);
      setView('list'); setEditId(null);
      loadEntries(filterClient);
    } catch(e) { setSaveError(e.message); }
    finally { setSaving(false); }
  };

  // ── Delete ──
  const del = async (id) => {
    try {
      await api('DELETE', `/api/tag-registry/${id}`, null, token);
      setDeleteConfirm(null); loadEntries(filterClient);
    } catch(e) { setListError(e.message); }
  };

  // ── Helpers ──
  const clientOptions  = (clients||[]).map(c => ({ value:c, label:c }));
  const ticketOptions  = tickets.filter(r => r.client===form.client)
    .map(r => ({ value:r.key, label:r.key, sub:`${r.summary}${r.date?` · ${r.date}`:''}` }));
  const sendoutOptions = sendouts.map(s => ({ value:s.id, label:s.id, sub:`${s.name||''}${s.date?` · ${s.date}`:''}` }));
  if (form.sendout_id && !sendoutOptions.find(x=>x.value===form.sendout_id))
    sendoutOptions.unshift({ value:form.sendout_id, label:form.sendout_id, sub:'matched by ticket' });

  const sections = [
    { id:'targeting', glyph:'01', label:'Targeting',    count: [form.client,form.ticket_key].filter(Boolean).length+'/2' },
    { id:'source',    glyph:'02', label:'Source',       count: [form.sendout_id].filter(Boolean).length+'/1' },
    { id:'schedule',  glyph:'03', label:'Schedule',     count: [form.sendout_date,form.sendout_time,form.tz].filter(Boolean).length+'/3' },
    { id:'config',    glyph:'04', label:'Config',       count: [form.platform,form.template_type].filter(Boolean).length+'/2' },
    { id:'rules',     glyph:'05', label:'Tag rules',    count: `${includeTags.length}+${excludeTags.length}`, active:true },
  ];

  const toggleBtn = (val, current, setter) => (
    <button type="button" onClick={() => setter(current===val ? '' : val)}
      style={{
        flex:1, padding:'7px 10px', borderRadius:4, cursor:'pointer',
        fontSize:12, fontWeight:600, fontFamily:t.font.sans,
        border:`1px solid ${current===val ? t.brand.base : t.border.input}`,
        background: current===val ? t.brand.soft : t.bg.surface1,
        color: current===val ? t.brand.text : t.fg[2],
        transition:'all .12s',
      }}>{val}</button>
  );

  /* ── LIST VIEW ── */
  if (view==='list') return (
    <div style={{ maxWidth:1200 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <div>
          <div style={{ fontFamily:t.font.display, fontSize:20, fontWeight:700, color:t.fg[1], letterSpacing:'-0.02em' }}>Sendout Form</div>
          <div style={{ fontSize:12, color:t.fg[3], marginTop:3 }}>Per-sendout tag rules — override Google Sheets when the ticket key matches at validation.</div>
        </div>
        <SFBtn primary glyph="+" onClick={openCreate}>New Entry</SFBtn>
      </div>

      {listError && (
        <div style={{ marginBottom:14, padding:'10px 14px', background:t.danger.soft, border:`1px solid ${t.danger.ring}`, borderRadius:6, fontSize:13, color:t.danger.base }}>
          {listError} <button onClick={()=>setListError('')} style={{ marginLeft:8, background:'none', border:'none', cursor:'pointer', color:t.danger.base, fontWeight:700 }}>✕</button>
        </div>
      )}

      {/* Filter */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
        <span style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'.08em', color:t.fg[3] }}>— Filter</span>
        <div style={{ width:220 }}>
          <SFSelect value={filterClient} onChange={v=>setFilterClient(v)} placeholder="All clients"
            options={[{value:'',label:'All clients'},...clientOptions]}/>
        </div>
        <div style={{ marginLeft:'auto', fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>
          {listLoading ? 'Loading…' : `${entries.length} entr${entries.length===1?'y':'ies'}`}
        </div>
      </div>

      {/* Card list */}
      {listLoading ? (
        <div style={{ padding:'48px 20px', textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>
          Loading…
        </div>
      ) : entries.length===0 ? (
        <div style={{ padding:'48px 20px', textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12, background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:8 }}>
          No entries yet — click "+ New Entry" to create the first one.
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {entries.map(e => {
            const st = splitTags(e.include_tags);
            const ex = splitTags(e.exclude_tags);
            const isExpired = e.sendout_date && e.sendout_date < new Date().toISOString().slice(0,10);
            const Chip = ({ label, bg, border, color, title }) => (
              <span title={title||label} style={{ fontSize:11, fontFamily:t.font.mono, padding:'2px 8px', background:bg, border:`1px solid ${border}`, borderRadius:999, color, whiteSpace:'nowrap', flexShrink:0 }}>{label}</span>
            );
            const TagRow = ({ tags, bg, border, color, icon }) => {
              if (!tags.length) return null;
              return (
                <div style={{ display:'flex', alignItems:'center', flexWrap:'wrap', gap:4 }}>
                  <span style={{ fontSize:10, color:t.fg[4], fontFamily:t.font.mono, marginRight:2 }}>{icon}</span>
                  {tags.slice(0,6).map((tg,i) => (
                    <span key={i} style={{ fontSize:10, fontFamily:t.font.mono, padding:'1px 7px', background:bg, border:`1px solid ${border}`, borderRadius:999, color }}>{tg}</span>
                  ))}
                  {tags.length>6 && <span style={{ fontSize:10, color:t.fg[4] }}>+{tags.length-6} more</span>}
                </div>
              );
            };
            return (
              <div key={e.id} style={{
                background: t.bg.surface1,
                border: `1px solid ${isExpired ? t.danger.ring : t.border.base}`,
                borderRadius: 8,
                padding: '14px 18px',
                opacity: isExpired ? 0.6 : 1,
                transition: 'box-shadow .12s',
              }}>
                {/* Row 1 — identity */}
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8, flexWrap:'wrap' }}>
                  {/* Client badge */}
                  <span style={{ fontSize:12, fontWeight:700, color:t.fg[1], padding:'2px 10px', background:t.bg.surface2, border:`1px solid ${t.border.base}`, borderRadius:4 }}>{e.client}</span>
                  {/* Ticket key */}
                  {e.ticket_key && (
                    <span style={{ fontSize:12, fontFamily:t.font.mono, fontWeight:700, color:t.brand.text, padding:'2px 8px', background:t.brand.soft, border:`1px solid ${t.brand.ring}`, borderRadius:4 }}>{e.ticket_key}</span>
                  )}
                  {/* Sendout name */}
                  {e.sendout_name && (
                    <span style={{ fontSize:13, fontWeight:600, color:t.fg[1], flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }} title={e.sendout_name}>{e.sendout_name}</span>
                  )}
                  {isExpired && <span style={{ fontSize:10, fontFamily:t.font.mono, color:t.danger.base, marginLeft:'auto' }}>EXPIRED</span>}
                  {/* Actions — pushed right */}
                  <div style={{ marginLeft:'auto', display:'flex', gap:5, flexShrink:0 }}>
                    <button onClick={()=>openEdit(e)} title="Edit"
                      style={{ padding:'4px 10px', border:`1px solid ${t.border.input}`, borderRadius:5, background:'none', cursor:'pointer', fontSize:12, color:t.fg[2] }}>✏️ Edit</button>
                    {deleteConfirm===e.id ? (
                      <>
                        <button onClick={()=>del(e.id)} style={{ padding:'4px 10px', border:`1px solid ${t.danger.base}`, borderRadius:5, background:t.danger.soft, cursor:'pointer', fontSize:11, color:t.danger.base, fontWeight:700 }}>Confirm</button>
                        <button onClick={()=>setDeleteConfirm(null)} style={{ padding:'4px 8px', border:`1px solid ${t.border.input}`, borderRadius:5, background:'none', cursor:'pointer', fontSize:11, color:t.fg[3] }}>✕</button>
                      </>
                    ) : (
                      <button onClick={()=>setDeleteConfirm(e.id)} title="Delete"
                        style={{ padding:'4px 8px', border:`1px solid ${t.border.input}`, borderRadius:5, background:'none', cursor:'pointer', fontSize:12, color:t.fg[3] }}>🗑</button>
                    )}
                  </div>
                </div>
                {/* Row 2 — metadata chips */}
                <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom: (st.length||ex.length) ? 8 : 0 }}>
                  {e.sendout_id && <Chip label={`ID: ${e.sendout_id}`} bg={t.bg.surface2} border={t.border.base} color={t.fg[3]} title="Sendout ID"/>}
                  {e.sendout_date && (
                    <Chip
                      label={`📅 ${e.sendout_date}${e.sendout_time ? ' · ' + e.sendout_time : ''}`}
                      bg={isExpired ? t.danger.soft : t.bg.surface2}
                      border={isExpired ? t.danger.ring : t.border.base}
                      color={isExpired ? t.danger.base : t.fg[2]}
                    />
                  )}
                  {e.tz && e.tz !== 'Europe/Berlin' && <Chip label={e.tz} bg={t.bg.surface2} border={t.border.base} color={t.fg[3]}/>}
                  {e.platform && <Chip label={e.platform} bg={t.accent.soft} border={t.accent.ring} color={t.accent.base}/>}
                  {e.template_type && <Chip label={e.template_type} bg={t.brand.soft} border={t.brand.ring} color={t.brand.text}/>}
                  {e.notes && <span style={{ fontSize:11, color:t.fg[3], fontStyle:'italic', marginLeft:4 }} title={e.notes}>📝 {e.notes.slice(0,60)}{e.notes.length>60?'…':''}</span>}
                </div>
                {/* Row 3 — tags */}
                {(st.length>0||ex.length>0) && (
                  <div style={{ display:'flex', flexDirection:'column', gap:5, paddingTop:6, borderTop:`1px dashed ${t.border.base}` }}>
                    <TagRow tags={st} bg={t.ok.soft} border={t.ok.ring} color={t.ok.base} icon="✓ include"/>
                    <TagRow tags={ex} bg={t.danger.soft} border={t.danger.ring} color={t.danger.base} icon="✕ exclude"/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <div style={{marginTop:18,padding:'11px 15px',background:t.bg.surface2,border:`1px solid ${t.border.base}`,borderRadius:6,fontSize:12,color:t.fg[3]}}>
        <strong style={{color:t.fg[2]}}>Priority:</strong> Registry (ticket key) → Registry (sendout ID) → Registry (date) → Google Sheets. Expired entries (past sendout date) are skipped automatically.
      </div>
    </div>
  );

  /* ── FORM VIEW (Direction A console layout) ── */
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'calc(100vh - 120px)', background:t.bg.app, borderRadius:8, border:`1px solid ${t.border.base}`, overflow:'hidden' }}>

      {/* App bar */}
      <div style={{ height:52, padding:'0 20px', display:'flex', alignItems:'center', justifyContent:'space-between', background:t.bg.surface1, borderBottom:`1px solid ${t.border.base}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ width:24, height:24, borderRadius:4, background:'#0e2a2a', display:'inline-flex', alignItems:'center', justifyContent:'center', color:'#b3dfdf', fontFamily:t.font.mono, fontSize:11, fontWeight:700 }}>SF</div>
          <div style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[3], letterSpacing:'.04em' }}>
            <span style={{color:t.fg[2]}}>sendout-form</span>
            <span style={{margin:'0 7px',color:t.fg[4]}}>›</span>
            <span style={{color:t.fg[1]}}>{editId ? `edit · ${form.ticket_key||form.sendout_id||'entry'}` : 'new'}</span>
          </div>
          <SFLed tone="ok" pulse/>
          <span style={{ fontFamily:t.font.mono, fontSize:10, color:t.fg[3], letterSpacing:'.12em', textTransform:'uppercase' }}>DMA · live</span>
          {enriching && <><span className="vp-spinner"/><span style={{fontSize:11,color:t.fg[3]}}>enriching…</span></>}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <SFBtn ghost onClick={() => { setView('list'); setEditId(null); }}>Cancel</SFBtn>
          <SFBtn primary glyph="▶" onClick={save} disabled={saving}>
            {saving ? 'Saving…' : editId ? 'Save changes' : 'Create entry'}
          </SFBtn>
        </div>
      </div>

      <div style={{ flex:1, display:'grid', gridTemplateColumns:'220px 1fr', overflow:'hidden' }}>

        {/* Sidebar */}
        <div style={{ padding:'18px 16px', background:t.bg.surface1, borderRight:`1px solid ${t.border.base}`, display:'flex', flexDirection:'column', gap:3, overflowY:'auto' }}>
          <div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'.08em', color:t.fg[3], marginBottom:10 }}>— Sections</div>
          {sections.map(s => (
            <div key={s.id} onClick={() => setActiveSection(s.id)}
              style={{ padding:'7px 10px', borderRadius:4, display:'flex', alignItems:'center', gap:10, cursor:'pointer',
                background: activeSection===s.id ? t.brand.soft : 'transparent',
                border: activeSection===s.id ? `1px solid ${t.brand.ring}` : '1px solid transparent',
              }}>
              <span style={{ fontFamily:t.font.mono, fontSize:10, color: activeSection===s.id ? t.brand.text : t.fg[4], letterSpacing:'.04em' }}>{s.glyph}</span>
              <span style={{ fontSize:13, fontWeight: activeSection===s.id ? 500 : 400, color: activeSection===s.id ? t.fg[1] : t.fg[2], flex:1 }}>{s.label}</span>
              <span style={{ fontFamily:t.font.mono, fontSize:10, color: activeSection===s.id ? t.brand.text : t.fg[4] }}>{s.count}</span>
            </div>
          ))}

          <hr style={{ border:'none', borderTop:`1px dashed ${t.border.input}`, margin:'14px 0 10px' }}/>
          <div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'.08em', color:t.fg[3], marginBottom:8 }}>— Match key</div>
          <div style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[2], lineHeight:1.9 }}>
            <div>ticket    = <span style={{color:t.brand.text}}>{form.ticket_key||'—'}</span></div>
            <div>sendout   = <span style={{color:t.brand.text}}>{form.sendout_id ? form.sendout_id.slice(0,10)+'…' : '—'}</span></div>
            <div>overrides = <span style={{color:t.brand.text}}>g-sheet</span></div>
          </div>
          <div style={{ marginTop:12, padding:'10px 11px', background:t.brand.soft, border:`1px solid ${t.brand.ring}`, borderRadius:4, fontSize:11, color:t.brand.text, lineHeight:1.55 }}>
            Entry overrides Google Sheets when the Jira ticket key matches at sendout time.
          </div>
        </div>

        {/* Scrollable form */}
        <div style={{ overflowY:'auto', padding:'24px 28px 60px' }}>
          <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:5 }}>
            <div style={{ fontFamily:t.font.display, fontSize:20, fontWeight:700, color:t.fg[1], letterSpacing:'-0.02em' }}>
              {editId ? 'Edit entry' : 'New entry'}
            </div>
            {saveError && <div style={{ fontSize:12, color:t.danger.base, fontWeight:600 }}>⚠ {saveError}</div>}
          </div>
          <div style={{ fontSize:13, color:t.fg[2], marginBottom:24 }}>Per-sendout include / exclude tags — used instead of Google Sheets when matched.</div>

          {/* 01 Targeting */}
          <div style={{ marginBottom:24 }}>
            <SFSectionHeader glyph="01" title="Targeting" subtitle="Who this entry applies to."/>
            <SFRow cols="1fr 1.4fr">
              <SFField>
                <SFFieldLabel required>Client</SFFieldLabel>
                <SFSelect value={form.client}
                  onChange={v => { setForm({...SF_EMPTY, client:v}); setIncludeTags([]); setExcludeTags([]); setSendouts([]); }}
                  options={clientOptions} placeholder="— select client —" disabled={!!editId}/>
                {editId && <SFHint>Client cannot be changed on edit.</SFHint>}
              </SFField>
              <SFField>
                <SFFieldLabel hint={enriching ? '⏳ enriching…' : 'auto-fills sendout + date'}>Jira ticket</SFFieldLabel>
                {ticketsLoading
                  ? <div style={{fontSize:12,color:t.fg[3],padding:'8px 0'}}><span className="vp-spinner"/> Loading queue…</div>
                  : <SFSelect value={form.ticket_key} onChange={onTicketChange}
                      options={ticketOptions} placeholder="— pick a ticket —" mono disabled={!form.client}/>
                }
                {form.ticket_key && (() => {
                  const tkt = tickets.find(r => r.key === form.ticket_key);
                  if (!tkt?.summary) return null;
                  return (
                    <div style={{ marginTop:6, padding:'6px 10px', background:t.brand.soft, border:`1px solid ${t.brand.ring}`, borderRadius:5, fontSize:12, color:t.fg[1], fontWeight:500, lineHeight:1.4 }}>
                      {tkt.summary}
                    </div>
                  );
                })()}
              </SFField>
            </SFRow>
          </div>

          {/* 02 Source */}
          <div style={{ marginBottom:24 }}>
            <SFSectionHeader glyph="02" title="Source" subtitle="DMA sendout this entry attaches to."/>
            <SFField>
              <SFFieldLabel>Sendout · from DMA</SFFieldLabel>
              {sendoutsLoading
                ? <div style={{fontSize:12,color:t.fg[3],padding:'8px 0'}}><span className="vp-spinner"/> Loading sendouts…</div>
                : <SFSelect value={form.sendout_id} onChange={v=>pf('sendout_id',v)}
                    options={sendoutOptions} placeholder="— select sendout —" mono disabled={!form.client}/>
              }
            </SFField>
            <div style={{height:14}}/>
            <SFField>
              <SFFieldLabel>Sendout name (label)</SFFieldLabel>
              <SFInput value={form.sendout_name} onChange={v=>pf('sendout_name',v)} placeholder="e.g. ALDI Sued Woche 21"/>
            </SFField>
          </div>

          {/* 03 Schedule */}
          <div style={{ marginBottom:24 }}>
            <SFSectionHeader glyph="03" title="Schedule"/>
            <SFRow cols="1fr 1fr 1.4fr">
              <SFField>
                <SFFieldLabel>Date</SFFieldLabel>
                <SFInput type="date" value={form.sendout_date} onChange={v=>pf('sendout_date',v)} mono/>
              </SFField>
              <SFField>
                <SFFieldLabel>Time · 24h</SFFieldLabel>
                <SFInput type="time" value={form.sendout_time} onChange={v=>pf('sendout_time',v)} mono/>
              </SFField>
              <SFField>
                <SFFieldLabel>Timezone</SFFieldLabel>
                <SFSelect value={form.tz} onChange={v=>pf('tz',v)}
                  options={SF_TZ.map(z=>({value:z,label:z}))} placeholder="— timezone —"/>
              </SFField>
            </SFRow>
          </div>

          {/* 04 Config */}
          <div style={{ marginBottom:24 }}>
            <SFSectionHeader glyph="04" title="Config" subtitle="Platform and message type."/>
            <SFRow cols="1fr 1fr">
              <SFField>
                <SFFieldLabel>Platform</SFFieldLabel>
                <div style={{display:'flex',gap:8}}>
                  {toggleBtn('WABA', form.platform, v=>pf('platform',v))}
                  {toggleBtn('RCS',  form.platform, v=>pf('platform',v))}
                </div>
              </SFField>
              <SFField>
                <SFFieldLabel>Template type</SFFieldLabel>
                <div style={{display:'flex',gap:8}}>
                  {toggleBtn('Regular',  form.template_type, v=>pf('template_type',v))}
                  {toggleBtn('Carousel', form.template_type, v=>pf('template_type',v))}
                </div>
              </SFField>
            </SFRow>
          </div>

          {/* 05 Tag rules — HudFrame */}
          <div style={{ marginBottom:24 }}>
            <SFSectionHeader glyph="05" title="Tag rules" subtitle="Comma or Enter to add a tag. Backspace to remove last." accent/>
            <SFHudFrame>
              <SFRow cols="1fr 1fr">
                <SFField>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <SFLed tone="ok" size={6}/>
                    <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:t.fg[3]}}>Include · {includeTags.length}</span>
                  </div>
                  <SFTagInput tags={includeTags} setTags={setIncludeTags} tone="include" placeholder="leaflet_accepted=true"/>
                  <SFHint>All include rules must match the recipient.</SFHint>
                </SFField>
                <SFField>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <SFLed tone="danger" size={6}/>
                    <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:t.fg[3]}}>Exclude · {excludeTags.length}</span>
                  </div>
                  <SFTagInput tags={excludeTags} setTags={setExcludeTags} tone="exclude" placeholder="declined_new_terms=true"/>
                  <SFHint>Any match drops the recipient from the sendout.</SFHint>
                </SFField>
              </SFRow>
            </SFHudFrame>
          </div>

          {/* Notes */}
          <SFField>
            <SFFieldLabel hint="optional">Notes</SFFieldLabel>
            <SFInput value={form.notes} onChange={v=>pf('notes',v)} placeholder="e.g. Week 21 — special promo, double opt-in required"/>
          </SFField>

          {/* Footer actions (also at bottom of form for long scroll) */}
          <div style={{marginTop:30,display:'flex',gap:8,alignItems:'center'}}>
            <SFBtn primary glyph="▶" onClick={save} disabled={saving}>
              {saving ? 'Saving…' : editId ? 'Save changes' : 'Create entry'}
            </SFBtn>
            <SFBtn ghost onClick={() => { setView('list'); setEditId(null); }}>Cancel</SFBtn>
            {saveError && <span style={{fontSize:12,color:t.danger.base,fontWeight:600,marginLeft:4}}>⚠ {saveError}</span>}
            <div style={{flex:1}}/>
            <div style={{fontFamily:t.font.mono,fontSize:11,color:t.fg[4]}}>nothing saved until you press the button</div>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════════════════
   EXAMPLES MANAGER
   ═════════════════════════════════════════════════════════════════════════ */
function ExamplesManager({ token }) {
  const CHECK_KEYS  = ['scheduling','copy','footer','cta','tags','images'];
  const VERDICT_OPT = ['PASS','FAIL','NA'];

  const [examples, setExamples] = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [filter,   setFilter]   = useState({client:'', check:'', verdict:''});
  const [editId,   setEditId]   = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saveErr,  setSaveErr]  = useState('');
  const [toast,    setToast]    = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 2500); };

  const load = async () => {
    setLoading(true);
    try {
      const data = await api('GET', '/api/examples', null, token);
      setExamples(data.examples || []);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ load(); }, []);

  const toggleActive = async (ex) => {
    try {
      await api('PUT', `/api/examples/${ex.id}`, { active: !ex.active }, token);
      showToast(ex.active ? 'Example disabled' : 'Example enabled');
      load();
    } catch(e) { alert(e.message); }
  };

  const deleteEx = async (ex) => {
    if (!confirm(`Delete example "${ex.scenario}"?\n\nThis cannot be undone.`)) return;
    try {
      await api('DELETE', `/api/examples/${ex.id}`, null, token);
      showToast('Example deleted');
      load();
    } catch(e) { alert(e.message); }
  };

  const startEdit = (ex) => {
    setEditId(ex.id);
    setSaveErr('');
    setEditForm({
      scenario: ex.scenario || '',
      verdict:  (ex.correct_output?.verdict) || ex.verdict || 'PASS',
      reason:   (ex.correct_output?.reason)  || '',
      expected: (ex.correct_output?.expected)|| '',
      actual:   (ex.correct_output?.actual)  || '',
    });
  };

  const saveEdit = async () => {
    setSaveErr('');
    try {
      await api('PUT', `/api/examples/${editId}`, editForm, token);
      setEditId(null);
      showToast('Example updated');
      load();
    } catch(e) { setSaveErr(e.message); }
  };

  const setEF = (k,v) => setEditForm(f=>({...f,[k]:v}));

  const filtered = examples.filter(e => {
    const cv = (e.correct_output?.verdict) || e.verdict || '';
    if (filter.client  && !e.client.toLowerCase().includes(filter.client.toLowerCase())) return false;
    if (filter.check   && e.check !== filter.check) return false;
    if (filter.verdict && cv !== filter.verdict) return false;
    return true;
  });

  const verdictBadge = (v) => {
    const map = { PASS:{bg:t.ok.soft,bd:t.ok.ring,clr:t.ok.base,lbl:'✅ PASS'},
                  FAIL:{bg:t.danger.soft,bd:t.danger.ring,clr:t.danger.base,lbl:'❌ FAIL'},
                  NA:  {bg:t.bg.surface3,bd:t.border.base,clr:t.fg[3],lbl:'🔕 NA'} };
    const s = map[v] || map.NA;
    return <span style={{ padding:'2px 8px', borderRadius:4, fontSize:11, fontWeight:600, background:s.bg, border:`1px solid ${s.bd}`, color:s.clr }}>{s.lbl}</span>;
  };

  const inp = (val,onChange,placeholder='') => (
    <input value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{ width:'100%', boxSizing:'border-box', padding:'6px 9px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12, fontFamily:t.font.mono }} />
  );
  const ta = (val,onChange,rows=2) => (
    <textarea value={val} onChange={e=>onChange(e.target.value)} rows={rows}
      style={{ width:'100%', boxSizing:'border-box', padding:'6px 9px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12, fontFamily:t.font.mono, resize:'vertical' }} />
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:t.ok.base, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:13, fontWeight:600, zIndex:9999, boxShadow:'0 4px 20px rgba(0,0,0,.3)' }}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:t.fg[0] }}>🧠 AI Training Examples</div>
          <div style={{ fontSize:12, color:t.fg[3], marginTop:2 }}>
            {examples.length} example{examples.length!==1?'s':''} in library · {examples.filter(e=>e.active).length} active
            · Up to 3 are injected into every AI audit prompt (most relevant first)
          </div>
        </div>
        <Button variant="ghost" onClick={load} disabled={loading}>{loading?'Loading…':'↺ Refresh'}</Button>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', padding:'12px 16px', background:t.bg.surface1, borderRadius:6, border:`1px solid ${t.border.base}` }}>
        <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
          <label style={{ fontSize:10, fontWeight:700, color:t.fg[3], textTransform:'uppercase', letterSpacing:'.06em' }}>Filter by client</label>
          <input value={filter.client} onChange={e=>setFilter(f=>({...f,client:e.target.value}))} placeholder="e.g. aldi sued"
            style={{ padding:'6px 10px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12, width:180 }} />
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
          <label style={{ fontSize:10, fontWeight:700, color:t.fg[3], textTransform:'uppercase', letterSpacing:'.06em' }}>Filter by check</label>
          <select value={filter.check} onChange={e=>setFilter(f=>({...f,check:e.target.value}))}
            style={{ padding:'6px 10px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12 }}>
            <option value="">All checks</option>
            {CHECK_KEYS.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
          <label style={{ fontSize:10, fontWeight:700, color:t.fg[3], textTransform:'uppercase', letterSpacing:'.06em' }}>Filter by verdict</label>
          <select value={filter.verdict} onChange={e=>setFilter(f=>({...f,verdict:e.target.value}))}
            style={{ padding:'6px 10px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12 }}>
            <option value="">All verdicts</option>
            {VERDICT_OPT.map(v=><option key={v} value={v}>{v}</option>)}
          </select>
        </div>
        {(filter.client||filter.check||filter.verdict) && (
          <div style={{ display:'flex', alignItems:'flex-end' }}>
            <Button variant="ghost" onClick={()=>setFilter({client:'',check:'',verdict:''})}>✕ Clear</Button>
          </div>
        )}
      </div>

      {/* Empty state */}
      {!loading && filtered.length === 0 && (
        <div style={{ padding:40, textAlign:'center', color:t.fg[3], fontSize:13 }}>
          {examples.length === 0
            ? 'No examples yet. Run an AI audit, then click 💾 on any check to save it as a training example.'
            : 'No examples match the current filters.'}
        </div>
      )}

      {/* Examples list */}
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {filtered.map(ex => {
          const cv = (ex.correct_output?.verdict) || ex.verdict || '';
          const isEditing = editId === ex.id;
          return (
            <div key={ex.id} style={{ background:t.bg.surface1, border:`1px solid ${isEditing?t.accent.base:t.border.base}`, borderRadius:8, overflow:'hidden', opacity:ex.active?1:0.55, transition:'opacity .2s' }}>
              {/* Row header */}
              <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 16px', flexWrap:'wrap' }}>
                {verdictBadge(cv)}
                <span style={{ fontSize:11, padding:'2px 8px', borderRadius:4, background:t.bg.surface2, border:`1px solid ${t.border.base}`, color:t.fg[2], fontFamily:t.font.mono }}>{ex.check}</span>
                <span style={{ fontSize:12, fontWeight:600, color:t.fg[0], flex:1 }}>{ex.scenario}</span>
                <span style={{ fontSize:11, color:t.fg[3], whiteSpace:'nowrap' }}>{ex.client === 'any' ? '🌐 any client' : ex.client}</span>
                <span style={{ fontSize:10, color:t.fg[4], fontFamily:t.font.mono, whiteSpace:'nowrap' }}>{ex.added_at||''}</span>
                {ex.added_by && <span style={{ fontSize:10, color:t.fg[4] }}>by {ex.added_by}</span>}

                {/* Actions */}
                <div style={{ display:'flex', gap:6, marginLeft:'auto' }}>
                  <button onClick={()=>toggleActive(ex)} title={ex.active?'Disable (won\'t be used in prompts)':'Enable'}
                    style={{ padding:'4px 10px', borderRadius:4, fontSize:11, fontWeight:600, cursor:'pointer',
                             background: ex.active ? t.ok.soft : t.bg.surface3,
                             border:`1px solid ${ex.active ? t.ok.ring : t.border.base}`,
                             color: ex.active ? t.ok.base : t.fg[3] }}>
                    {ex.active ? '● Active' : '○ Disabled'}
                  </button>
                  <button onClick={()=>isEditing ? setEditId(null) : startEdit(ex)}
                    style={{ padding:'4px 10px', borderRadius:4, fontSize:11, cursor:'pointer', background:t.bg.surface2, border:`1px solid ${t.border.base}`, color:t.fg[1] }}>
                    {isEditing ? '✕ Cancel' : '✏️ Edit'}
                  </button>
                  <button onClick={()=>deleteEx(ex)}
                    style={{ padding:'4px 10px', borderRadius:4, fontSize:11, cursor:'pointer', background:t.danger.soft, border:`1px solid ${t.danger.ring}`, color:t.danger.base }}>
                    🗑
                  </button>
                </div>
              </div>

              {/* Collapsed detail (always visible) */}
              {!isEditing && (
                <div style={{ padding:'0 16px 12px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  {[['Reason', ex.correct_output?.reason], ['Expected', ex.correct_output?.expected], ['Actual', ex.correct_output?.actual]].filter(([,v])=>v).map(([lbl,val])=>(
                    <div key={lbl} style={{ gridColumn: lbl==='Reason'?'1 / -1':undefined }}>
                      <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:2, textTransform:'uppercase', letterSpacing:'.06em' }}>{lbl}</div>
                      <div style={{ fontSize:11, color:t.fg[1], fontFamily:t.font.mono, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{val}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Edit form */}
              {isEditing && (
                <div style={{ padding:'0 16px 16px', display:'flex', flexDirection:'column', gap:10, borderTop:`1px solid ${t.border.base}` }}>
                  <div style={{ marginTop:12 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:4, textTransform:'uppercase', letterSpacing:'.06em' }}>Scenario</div>
                    {inp(editForm.scenario, v=>setEF('scenario',v), 'Scenario description')}
                  </div>
                  <div>
                    <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:4, textTransform:'uppercase', letterSpacing:'.06em' }}>Verdict</div>
                    <select value={editForm.verdict} onChange={e=>setEF('verdict',e.target.value)}
                      style={{ padding:'6px 9px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12 }}>
                      <option value="PASS">✅ PASS</option><option value="FAIL">❌ FAIL</option><option value="NA">🔕 NA</option>
                    </select>
                  </div>
                  {['reason','expected','actual'].map(field=>(
                    <div key={field}>
                      <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:4, textTransform:'uppercase', letterSpacing:'.06em' }}>{field}</div>
                      {ta(editForm[field], v=>setEF(field,v))}
                    </div>
                  ))}
                  {saveErr && <div style={{ padding:'7px 10px', borderRadius:4, background:t.danger.soft, color:t.danger.base, fontSize:12, border:`1px solid ${t.danger.ring}` }}>{saveErr}</div>}
                  <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
                    <Button variant="ghost" onClick={()=>setEditId(null)}>Cancel</Button>
                    <Button onClick={saveEdit}>Save Changes</Button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   PREFLIGHT HISTORY
   ═════════════════════════════════════════════════════════════════════════ */
function PreflightHistory({ token }) {
  const [runs,    setRuns]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [open,    setOpen]    = useState(null);  // expanded run id
  const [running, setRunning] = useState(false);
  const [err,     setErr]     = useState('');

  async function load() {
    try {
      const data = await api('GET', '/api/preflight/runs', null, token);
      setRuns(data);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  async function runNow() {
    setRunning(true); setErr('');
    try {
      await api('POST', '/api/preflight/run-now', null, token);
      await load();
    } catch(e) { setErr(e.message); }
    finally { setRunning(false); }
  }

  useEffect(() => { load(); }, []);

  const DELTA_LABEL = { 0:'🔴 TODAY', 1:'🟡 Tomorrow', 2:'🟠 In 2 days' };
  const AUDIT_COLOR = { PASS: t.ok.base, FAIL: t.danger.base };

  return (
    <div>
      <SectionHeader style={{ marginTop:0 }}>
        🔔 Preflight History
        <div style={{ marginLeft:'auto', display:'flex', gap:8, alignItems:'center' }}>
          {err && <span style={{ fontSize:11, color:t.danger.base }}>{err}</span>}
          <Button variant="ghost" onClick={runNow} disabled={running} style={{ fontSize:11, padding:'4px 10px' }}>
            {running ? 'Running…' : '▶ Run now'}
          </Button>
          <Button variant="ghost" onClick={load} style={{ fontSize:11, padding:'4px 10px' }}>↻</Button>
        </div>
      </SectionHeader>
      {loading && <div style={{ fontSize:12, color:t.fg[3], fontFamily:t.font.mono }}>Loading…</div>}
      {!loading && runs.length === 0 && (
        <div style={{ fontSize:12, color:t.fg[4], fontFamily:t.font.mono }}>No preflight runs recorded yet.</div>
      )}
      {runs.map(run => (
        <div key={run.id} style={{ border:`1px solid ${t.border.base}`, borderRadius:6, marginBottom:8, overflow:'hidden' }}>
          <div onClick={() => setOpen(o => o===run.id ? null : run.id)}
            style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', cursor:'pointer',
              background: open===run.id ? t.bg.surface2 : t.bg.surface1 }}>
            <span style={{ fontSize:14 }}>{open===run.id ? '▾' : '›'}</span>
            <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>
              {(run.ran_at||'').slice(0,16).replace('T',' ')} UTC
            </span>
            <Badge kind={run.sent_slack ? 'ok' : 'warn'} style={{ fontSize:10 }}>
              {run.sent_slack ? '✓ Slack sent' : 'no Slack'}
            </Badge>
            <span style={{ fontSize:12, color:t.fg[2] }}>{(run.tickets||[]).length} ticket(s)</span>
            <span style={{ marginLeft:'auto', display:'flex', gap:5 }}>
              {(run.tickets||[]).map(tk => (
                <span key={tk.key} style={{ fontSize:10, padding:'2px 7px', borderRadius:999,
                  color: tk.audit ? AUDIT_COLOR[tk.audit]||t.fg[2] : t.fg[4],
                  background: tk.audit==='PASS'?t.ok.soft : tk.audit==='FAIL'?t.danger.soft : t.bg.surface3,
                  border:`1px solid ${tk.audit==='PASS'?t.ok.ring : tk.audit==='FAIL'?t.danger.ring : t.border.base}` }}>
                  {tk.key}
                </span>
              ))}
            </span>
          </div>
          {open===run.id && (
            <div style={{ padding:'12px 14px', borderTop:`1px solid ${t.border.base}`, display:'flex', flexDirection:'column', gap:6 }}>
              {(run.tickets||[]).map(tk => (
                <div key={tk.key} style={{ display:'grid', gridTemplateColumns:'90px 180px 1fr 90px 80px', gap:8, alignItems:'center',
                  padding:'7px 10px', borderRadius:4, background:t.bg.surface2, fontSize:12 }}>
                  <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>{tk.date}</span>
                  <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.brand.base }}>{tk.key}</span>
                  <span style={{ color:t.fg[2], fontSize:12 }}>{tk.client}</span>
                  <span style={{ fontSize:11, color:t.fg[3] }}>{DELTA_LABEL[tk.delta]||''}</span>
                  <span style={{ fontSize:11, fontWeight:600,
                    color: tk.audit ? AUDIT_COLOR[tk.audit]||t.fg[3] : t.fg[4] }}>
                    {tk.audit ? `AI ${tk.audit}` : '⏳ pending'}
                    {tk.confidence >= 0 && <span style={{ fontWeight:400, color:t.fg[4] }}> {tk.confidence}%</span>}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   AI AUDIT HISTORY
   ═════════════════════════════════════════════════════════════════════════ */
function AuditHistory({ token }) {
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter,  setFilter]  = useState('');

  useEffect(() => {
    api('GET', '/api/audit-history?limit=100', null, token)
      .then(setRows).catch(()=>{}).finally(()=>setLoading(false));
  }, [token]);

  const VERDICT_COLOR = { PASS: t.ok.base, FAIL: t.danger.base, NA: t.fg[4], '': t.fg[4] };
  const VERDICT_BG    = { PASS: t.ok.soft, FAIL: t.danger.soft, NA: t.bg.surface3, '': t.bg.surface3 };
  const VERDICT_BD    = { PASS: t.ok.ring, FAIL: t.danger.ring, NA: t.border.base, '': t.border.base };

  function VerdictDot({ v }) {
    return <span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%',
      background: VERDICT_COLOR[v]||t.fg[4], flexShrink:0 }} />;
  }

  const checks = ['scheduling','copy','footer','cta','tags','images'];
  const filtered = rows.filter(r =>
    !filter ||
    r.ticket_key.toLowerCase().includes(filter.toLowerCase()) ||
    r.client.toLowerCase().includes(filter.toLowerCase())
  );

  return (
    <div>
      <SectionHeader style={{ marginTop:0 }}>
        🤖 AI Audit History
        <div style={{ marginLeft:'auto', display:'flex', gap:8, alignItems:'center' }}>
          <Input value={filter} onChange={setFilter} placeholder="filter by ticket or client…"
            style={{ fontSize:11, padding:'4px 8px', width:200 }} />
        </div>
      </SectionHeader>
      {loading && <div style={{ fontSize:12, color:t.fg[3], fontFamily:t.font.mono }}>Loading…</div>}
      {!loading && filtered.length === 0 && (
        <div style={{ fontSize:12, color:t.fg[4], fontFamily:t.font.mono }}>No AI audits recorded yet.</div>
      )}
      {filtered.length > 0 && (
        <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden' }}>
          {/* Header */}
          <div style={{ display:'grid', gridTemplateColumns:'130px 90px 150px 60px 60px repeat(6,46px)', gap:0,
            padding:'6px 12px', borderBottom:`1px solid ${t.border.base}`, fontSize:10,
            fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:t.fg[3] }}>
            <span>Time</span><span>Ticket</span><span>Client</span>
            <span>Overall</span><span>Conf.</span>
            {checks.map(c => <span key={c} style={{ textAlign:'center', fontSize:9 }}>{c.slice(0,4)}</span>)}
          </div>
          {filtered.slice(0, 50).map((r, i) => (
            <div key={r.id} style={{ display:'grid', gridTemplateColumns:'130px 90px 150px 60px 60px repeat(6,46px)',
              gap:0, padding:'6px 12px', alignItems:'center',
              borderBottom: i<filtered.length-1 ? `1px solid ${t.border.base}` : 'none',
              background: i%2===0 ? 'transparent' : t.bg.surface2 }}>
              <span style={{ fontFamily:t.font.mono, fontSize:10, color:t.fg[3] }}>
                {(r.created_at||'').slice(0,16).replace('T',' ')}
              </span>
              <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.brand.base }}>{r.ticket_key||'—'}</span>
              <span style={{ fontSize:11, color:t.fg[2], overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.client||'—'}</span>
              <span>
                <span style={{ fontSize:10, padding:'2px 7px', borderRadius:999, fontWeight:600,
                  color: VERDICT_COLOR[r.overall]||t.fg[3],
                  background: VERDICT_BG[r.overall]||t.bg.surface3,
                  border:`1px solid ${VERDICT_BD[r.overall]||t.border.base}` }}>
                  {r.overall||'—'}
                </span>
              </span>
              <span style={{ fontFamily:t.font.mono, fontSize:11,
                color: r.confidence>=80?t.ok.base:r.confidence>=60?t.warn.base:r.confidence>=0?t.danger.base:t.fg[4] }}>
                {r.confidence >= 0 ? `${r.confidence}%` : '—'}
              </span>
              {checks.map(c => (
                <span key={c} style={{ textAlign:'center' }}>
                  <VerdictDot v={r[c]||''} />
                </span>
              ))}
            </div>
          ))}
        </div>
      )}
      {filtered.length > 50 && (
        <div style={{ fontSize:11, color:t.fg[4], fontFamily:t.font.mono, marginTop:6 }}>
          Showing 50 of {filtered.length} — use the ticket/client filter to narrow results.
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   USER MANAGEMENT
   ═════════════════════════════════════════════════════════════════════════ */
function UsersPanel({ token }) {
  const [users,   setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState('');
  const [form,    setForm]    = useState({ username:'', display_name:'', password:'', is_admin:false });
  const [saving,  setSaving]  = useState(false);
  const [editPwd, setEditPwd] = useState({});   // {username: newPwd}

  async function load() {
    try {
      const data = await api('GET', '/api/users', null, token);
      setUsers(data);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  async function createUser() {
    if (!form.username.trim() || !form.password.trim() || !form.display_name.trim()) {
      setErr('Username, display name and password are required'); return;
    }
    setSaving(true); setErr('');
    try {
      await api('POST', '/api/users', form, token);
      setForm({ username:'', display_name:'', password:'', is_admin:false });
      await load();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function toggleActive(u) {
    try {
      await api('PUT', `/api/users/${u.username}`, { active: !u.active }, token);
      await load();
    } catch(e) { setErr(e.message); }
  }

  async function toggleAdmin(u) {
    try {
      await api('PUT', `/api/users/${u.username}`, { is_admin: !u.is_admin }, token);
      await load();
    } catch(e) { setErr(e.message); }
  }

  async function resetPassword(username) {
    const pwd = editPwd[username];
    if (!pwd || pwd.length < 6) { setErr('Password must be at least 6 characters'); return; }
    try {
      await api('PUT', `/api/users/${username}`, { password: pwd }, token);
      setEditPwd(p => ({ ...p, [username]: '' }));
      setErr('');
    } catch(e) { setErr(e.message); }
  }

  async function deleteUser(username) {
    if (!window.confirm(`Delete user "${username}"? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/api/users/${username}`, null, token);
      await load();
    } catch(e) { setErr(e.message); }
  }

  return (
    <div style={{ padding:'24px 32px', maxWidth:860 }}>
      <div style={{ fontFamily:t.font.display, fontSize:20, fontWeight:600, color:t.fg[1], marginBottom:24 }}>
        User Management
      </div>

      {err && <div style={{ color:t.danger.base, fontSize:13, marginBottom:12 }}>{err}</div>}

      {/* User list */}
      <SectionHeader style={{ marginTop:0 }}>Team Members</SectionHeader>
      {loading ? (
        <div style={{ fontSize:12, color:t.fg[3], fontFamily:t.font.mono }}>Loading…</div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {users.map(u => (
            <div key={u.username} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px',
              background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6,
              opacity: u.active ? 1 : 0.5 }}>
              <div style={{ width:34, height:34, borderRadius:'50%', background:t.bg.surface2,
                border:`1px solid ${t.border.base}`, display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:t.font.mono, fontSize:14, color:t.brand.base, flexShrink:0 }}>
                {u.display_name.slice(0,1).toUpperCase()}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600, color:t.fg[1] }}>{u.display_name}</div>
                <div style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>@{u.username}</div>
              </div>
              {u.is_admin && <Badge kind="warn" style={{ fontSize:10 }}>admin</Badge>}
              {!u.active  && <Badge kind="danger" style={{ fontSize:10 }}>inactive</Badge>}

              {/* Password reset inline */}
              <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                <Input value={editPwd[u.username]||''} type="password"
                  onChange={v => setEditPwd(p=>({...p,[u.username]:v}))}
                  placeholder="new password…" style={{ fontSize:12, padding:'5px 8px', width:140 }} />
                <Button variant="ghost" onClick={()=>resetPassword(u.username)}
                  style={{ fontSize:11, padding:'4px 9px', whiteSpace:'nowrap' }}>Reset pwd</Button>
              </div>

              <Button variant="ghost" onClick={()=>toggleAdmin(u)} style={{ fontSize:11, padding:'4px 9px' }}>
                {u.is_admin ? 'Remove admin' : 'Make admin'}
              </Button>
              <Button variant="ghost" onClick={()=>toggleActive(u)} style={{ fontSize:11, padding:'4px 9px' }}>
                {u.active ? 'Deactivate' : 'Reactivate'}
              </Button>
              <Button variant="danger" onClick={()=>deleteUser(u.username)} style={{ fontSize:11, padding:'4px 9px' }}>
                Delete
              </Button>
            </div>
          ))}
        </div>
      )}

      {/* Add user */}
      <SectionHeader>Add New User</SectionHeader>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr auto', gap:10, alignItems:'end' }}>
        <div>
          <Overline style={{ marginBottom:5 }}>— username</Overline>
          <Input value={form.username} onChange={v=>setForm(f=>({...f,username:v}))} placeholder="e.g. anna" />
        </div>
        <div>
          <Overline style={{ marginBottom:5 }}>— display name</Overline>
          <Input value={form.display_name} onChange={v=>setForm(f=>({...f,display_name:v}))} placeholder="e.g. Anna Smith" />
        </div>
        <div>
          <Overline style={{ marginBottom:5 }}>— password</Overline>
          <Input type="password" value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} placeholder="initial password" />
        </div>
        <Button onClick={createUser} disabled={saving}>{saving?'Creating…':'Add user'}</Button>
      </div>
      <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:8 }}>
        <label style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:13, color:t.fg[2] }}>
          <input type="checkbox" checked={form.is_admin} onChange={e=>setForm(f=>({...f,is_admin:e.target.checked}))}
            style={{ accentColor:t.brand.base }} />
          Grant admin privileges
        </label>
      </div>
    </div>
  );
}

/** Single alias chip with delete button */
function AliasChip({ value, onDelete }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, background:t.bg.surface2, border:`1px solid ${t.border.input}`, borderRadius:4, padding:'4px 10px', fontFamily:t.font.mono, fontSize:12, color:t.fg[2] }}>
      {value}
      <button onClick={onDelete} style={{ background:'none', border:'none', cursor:'pointer', color:t.danger.base, fontSize:14, lineHeight:1, padding:0 }}>×</button>
    </span>
  );
}

/** Alias list editor: shows chips + an "add" input */
function AliasEditor({ aliases, onChange }) {
  const [draft, setDraft] = useState('');
  function add() {
    const v = draft.trim();
    if (v && !aliases.includes(v)) onChange([...aliases, v]);
    setDraft('');
  }
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
      <div style={{ display:'flex', flexWrap:'wrap', gap:6, minHeight:32 }}>
        {aliases.map((a,i)=>(
          <AliasChip key={i} value={a} onDelete={()=>onChange(aliases.filter((_,j)=>j!==i))} />
        ))}
        {aliases.length===0&&<span style={{fontFamily:t.font.mono,fontSize:12,color:t.fg[4]}}>no aliases</span>}
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <Input value={draft} onChange={setDraft} placeholder="add alias…" style={{ flex:1 }}
          onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();add();} }} />
        <Button variant="ghost" onClick={add} style={{ whiteSpace:'nowrap', flexShrink:0 }}>+ Add</Button>
      </div>
    </div>
  );
}

const DAYS_OF_WEEK = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

/** Smart UI for scheduled_day filter rule */
function ScheduledDayRuleRow({ rule, onChange, onDelete }) {
  const mode = rule.mode || 'exclude';
  const dayVals = Array.isArray(rule.values) ? rule.values
    : rule.value ? [rule.value] : [];
  function toggleDay(day) {
    const next = dayVals.includes(day) ? dayVals.filter(d=>d!==day) : [...dayVals, day];
    const base = { type:'scheduled_day', mode };
    if (next.length === 1) onChange({...base, value: next[0]});
    else onChange({...base, values: next});
  }
  function setMode(m) {
    const base = { type:'scheduled_day', mode: m };
    if (dayVals.length === 1) onChange({...base, value: dayVals[0]});
    else if (dayVals.length > 1) onChange({...base, values: dayVals});
    else onChange(base);
  }
  return (
    <div style={{ background:t.bg.surface2, border:`1px solid ${t.border.input}`, borderRadius:4, padding:'10px 12px', position:'relative' }}>
      <button onClick={onDelete} title="Remove rule"
        style={{ position:'absolute', top:6, right:8, background:'none', border:'none', cursor:'pointer', color:t.danger.base, fontSize:16, lineHeight:1 }}>×</button>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
        <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>📅 Scheduled Day</span>
        <Select value={mode} onChange={setMode}
          options={[{value:'exclude',label:'Must NOT be on'},{value:'include',label:'Must be on'}]}
          style={{ fontSize:12, width:160 }} />
      </div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        {DAYS_OF_WEEK.map(day=>{
          const active = dayVals.includes(day);
          return (
            <button key={day} onClick={()=>toggleDay(day)}
              style={{ padding:'4px 10px', borderRadius:12, border:`1px solid ${active?(mode==='exclude'?t.danger.base:t.ok.base):t.border.input}`,
                background: active?(mode==='exclude'?t.danger.soft:t.ok.soft):'transparent',
                color: active?(mode==='exclude'?t.danger.base:t.ok.base):t.fg[2],
                fontSize:12, cursor:'pointer', textTransform:'capitalize' }}>
              {day}
            </button>
          );
        })}
      </div>
      {dayVals.length === 0 && <div style={{ fontSize:11, color:t.fg[4], marginTop:6 }}>Select at least one day</div>}
    </div>
  );
}

/** One filter rule row inside a filter set */
function FilterRuleRow({ rule, onChange, onDelete }) {

function AddFieldInline({ onAdd }) {
