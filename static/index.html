<!-- Tokens + VP panel interactivity (must load before Babel and before any injected HTML) -->
<script>
window.tokens = {
  bg: { app:'#f6f8fb', appSoft:'#f0f3f7', surface1:'#ffffff', surface2:'#f6f8fb', surface3:'#eef2f7' },
  border: { base:'#e6eaef', input:'#d6dce5', hud:'#b3dfdf' },
  fg: { 1:'#0f1828', 2:'#475068', 3:'#8893a3', 4:'#aab3c1' },
  brand: { base:'#0fb5b5', hover:'#0ca0a0', soft:'#0fb5b515', ring:'#0fb5b540', text:'#0a8080', slide:'#0a8080', glow:'0 0 12px rgba(15,181,181,0.22)', glowSm:'0 0 6px rgba(15,181,181,0.30)', dark:'#0e2a2a' },
  accent: { base:'#00a8c8', soft:'#00a8c815', ring:'#00a8c840', glow:'0 0 6px rgba(0,168,200,0.30)', glowSm:'0 0 4px rgba(0,168,200,0.35)' },
  ok:     { base:'#0c8f4a', soft:'#0c8f4a15', soft2:'#0c8f4a08', ring:'#0c8f4a40', border:'#0c8f4a55', glow:'0 0 6px rgba(12,143,74,0.30)' },
  danger: { base:'#dc2626', soft:'#dc262615', soft2:'#dc262608', ring:'#dc262640', border:'#dc262655', glow:'0 0 6px rgba(220,38,38,0.32)' },
  warn:   { base:'#c47d0a', soft:'#c47d0a15', soft2:'#c47d0a08', ring:'#c47d0a40', glow:'0 0 6px rgba(196,125,10,0.30)' },
  info:   { base:'#0a8080', soft:'#0fb5b515', ring:'#0fb5b540' },
  r: { xs:2, sm:3, md:4, lg:6, xl:8, pill:999 },
  font: { sans:"'Space Grotesk',system-ui,sans-serif", mono:"'JetBrains Mono',ui-monospace,monospace", display:"'Space Grotesk',sans-serif" },
  ls: { overline:'0.12em', overlineLoose:'0.16em', display:'-0.02em', data:'0.06em' },
};

/* ── VP result-panel interactivity ──────────────────────────────────────────
   build_results_html() outputs onclick="showTab(...)" etc. as inline handlers.
   React's dangerouslySetInnerHTML never executes injected <script> tags, so
   these functions must live here as globals BEFORE any result HTML is rendered.
   ─────────────────────────────────────────────────────────────────────────── */
function showTab(id, btn) {
  document.querySelectorAll('.vp-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.vp-nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var panel = document.getElementById('vp-panel-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}
function toggleSlide(uid) {
  var body = document.getElementById(uid);
  var arr  = document.getElementById('arr_' + uid);
  if (!body) return;
  var isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  if (arr) arr.classList.toggle('open', !isOpen);
}
function toggleVis(uid) {
  var el = document.getElementById(uid);
  if (!el) return;
  var hidden = el.style.display === 'none' || el.style.display === '';
  el.style.display = hidden ? 'block' : 'none';
}
</script>

<script type="text/babel">
/* ─────────────────────────────────────────────────────────────────────────────
   ALL JSX — tokens already on window, React/ReactDOM loaded above
   ───────────────────────────────────────────────────────────────────────── */
const { useState, useEffect, useRef, useCallback } = React;
const t = window.tokens;

/* ── API helper ──────────────────────────────────────────────────────────── */
async function api(method, path, body, token) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
    },
    ...(body ? { body: JSON.stringify(body) } : {}),
  };
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

/* ══════════════════════════════════════════════════════════════════════════
   PRIMITIVES  (from Primitives.jsx)
   ═════════════════════════════════════════════════════════════════════════ */
function Overline({ children, style }) {
  return <div style={{ fontFamily:t.font.mono, fontSize:11, fontWeight:500, textTransform:'uppercase', letterSpacing:t.ls.overline, color:t.fg[3], ...style }}>{children}</div>;
}
function SectionHeader({ children, style }) {
  return (
    <div style={{ fontFamily:t.font.mono, fontSize:11, fontWeight:500, textTransform:'uppercase', letterSpacing:t.ls.overlineLoose, color:t.fg[3], margin:'28px 0 12px', paddingBottom:8, borderBottom:`1px solid ${t.border.base}`, display:'flex', alignItems:'center', gap:10, ...style }}>
      <span style={{ color:t.accent.base, letterSpacing:0 }}>—</span><span>{children}</span>
    </div>
  );
}
function Led({ kind='accent', pulse, style }) {
  const m = { accent:{c:t.accent.base,g:t.accent.glow}, ok:{c:t.ok.base,g:t.ok.glow}, danger:{c:t.danger.base,g:t.danger.glow}, warn:{c:t.warn.base,g:t.warn.glow}, dim:{c:t.fg[4],g:'none'} };
  const {c,g} = m[kind]||m.accent;
  return <span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%', background:c, boxShadow:g, verticalAlign:'middle', animation:pulse?'vp-led-pulse 1.6s ease-in-out infinite':'none', ...style }} />;
}
const Corner = ({style}) => <span style={{ position:'absolute', width:14, height:14, border:`1px solid ${t.accent.base}`, pointerEvents:'none', ...style }} />;
function HudPanel({ children, style }) {
  return (

      <Corner style={{ top:-1, left:-1, borderRight:'none', borderBottom:'none' }} />
      <Corner style={{ top:-1, right:-1, borderLeft:'none', borderBottom:'none' }} />
      <Corner style={{ bottom:-1, left:-1, borderRight:'none', borderTop:'none' }} />
      <Corner style={{ bottom:-1, right:-1, borderLeft:'none', borderTop:'none' }} />
      {children}
    </div>
  );
}
function Readout({ label, value, valueKind, sub, subKind }) {
  const vc = ({accent:t.accent.base, ok:t.ok.base, danger:t.danger.base, warn:t.warn.base}[valueKind])||t.fg[1];
  const sc = ({ok:t.ok.base, danger:t.danger.base, warn:t.warn.base, accent:t.accent.base}[subKind])||t.fg[3];
  return (

      <Overline>— {label}</Overline>
      <div style={{ fontFamily:t.font.mono, fontSize:18, fontWeight:600, color:vc, letterSpacing:t.ls.data }}>{value}</div>
      {sub && <div style={{ fontFamily:t.font.mono, fontSize:10, color:sc, letterSpacing:t.ls.overline }}>{sub}</div>}

}
function Bracket({ children, color }) {
  return <span style={{ fontFamily:t.font.mono, fontSize:11, letterSpacing:t.ls.overline, color:color||t.accent.base }}><span style={{opacity:.7}}>[ </span>{children}<span style={{opacity:.7}}> ]</span></span>;
}
function Card({ title, children, style }) {

function Badge({ kind='info', children, style }) {

function CheckRow({ kind='ok', label, value }) {

function Button({ variant='primary', onClick, children, style, disabled }) {
  const [hover, setHover] = useState(false);
  const base = {
    primary: { background:t.brand.base, color:'#fff', border:'none' },
    ghost:   { background:'transparent', color:t.fg[3], border:`1px solid ${t.border.input}` },
    danger:  { background:'transparent', color:t.danger.base, border:`1px solid ${t.danger.ring}` },
    toggle:  { background:'transparent', color:t.fg[3], border:`1px solid ${t.border.input}`, borderRadius:4, padding:'5px 12px', fontSize:12 },
  }[variant]||{ background:t.brand.base, color:'#fff', border:'none' };
  const hov = hover&&!disabled ? (variant==='primary'?{background:t.brand.hover}:{borderColor:t.brand.base,color:t.brand.text}) : {};

    <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}

function Input({ value, onChange, placeholder, style, type='text', onKeyDown }) {

function Select({ value, onChange, options=[], style }) {

      {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}

function Login({ onSignIn }) {
  const [u, setU] = useState('');

  const [loading, setLoading] = useState(false);
  const [now] = useState(() => new Date().toISOString());

  const submit = async () => {
    if (!u || !p) { setErr('Enter username and password'); return; }
    setLoading(true); setErr('');
    try {
      const data = await api('POST', '/api/auth/login', { username: u, password: p });
      onSignIn(data.token, data.name);
    } catch (e) {
      setErr(e.message || 'Invalid credentials');
    } finally {
      setLoading(false);
    }

  return (
    <div style={{ minHeight:'100vh', background:t.bg.app, display:'flex', justifyContent:'center', alignItems:'center', fontFamily:t.font.sans, padding:24 }}>

          <div>
            <div style={{ fontFamily:t.font.display, fontWeight:600, fontSize:22, color:t.fg[1], letterSpacing:'-0.01em' }}>Validator Pro</div>
            <div style={{ fontFamily:t.font.mono, fontSize:10, letterSpacing:'0.16em', textTransform:'uppercase', color:t.fg[3], marginTop:2 }}>360dialog · sendout audit</div>
          </div>

        <hr style={{ border:'none', borderTop:`1px dashed ${t.border.hud}`, margin:'0 0 18px' }} />

        </div>
        <hr style={{ border:'none', borderTop:`1px dashed ${t.border.hud}`, margin:'22px 0 14px' }} />
        <div style={{ fontFamily:t.font.mono, fontSize:10, color:t.fg[4], lineHeight:1.9, letterSpacing:'0.06em' }}>

          <div>BUILD · <span style={{color:t.accent.base}}>2026.05-stable</span></div>
        </div>
      </HudPanel>

  );
}

/* Extract the "Overall: ..." line from an AI report */
function _extractOverall(report) {
  if (!report) return null;
  const m = report.match(/\*\*Overall[:\s]+(.+?)\*\*/i);
  return m ? m[1].trim() : null;
}

/* Extract failed check names from report verdicts */
function _extractFailedNames(report) {
  if (!report) return [];
  const hits = [];
  const re = /###.*?CHECK\s+\d+\s*[—–-]\s*([^\n]+)\n[\s\S]*?\*\*Verdict:\*\*\s*❌/gi;
  let m;
  while ((m = re.exec(report)) !== null) hits.push(m[1].trim());
  return hits;
}

function BulkResultPanel({ results, mode, onBack }) {
  const [openKey, setOpenKey] = useState(null);
  const [showReport, setShowReport] = useState({});
  const sorted = [...results].sort((a,b) => {
    // failed first, then skipped, then passed
    const order = { failed:0, error:1, skipped:2, passed:3 };
    return (order[a.status]??9) - (order[b.status]??9) || a.ticket_key.localeCompare(b.ticket_key);
  });
  const passed  = results.filter(r=>r.status==='passed').length;
  const failed  = results.filter(r=>r.status==='failed').length;
  const skipped = results.filter(r=>r.status==='skipped').length;
  const errors  = results.filter(r=>r.status==='error').length;
  const avgConf = mode==='ai' ? (() => {
    const cs = results.filter(r=>r.confidence>=0).map(r=>r.confidence);
    return cs.length ? Math.round(cs.reduce((a,b)=>a+b,0)/cs.length) : null;
  })() : null;

  const statusStyle = s => ({
    passed:  { bg:t.ok.soft,     fg:t.ok.base,     bd:t.ok.ring,     icon:'✅' },
    failed:  { bg:t.danger.soft, fg:t.danger.base,  bd:t.danger.ring, icon:'❌' },
    skipped: { bg:t.warn.soft,   fg:t.warn.base,    bd:t.warn.ring,   icon:'⏭' },
    error:   { bg:t.danger.soft, fg:t.danger.base,  bd:t.danger.ring, icon:'⚠️' },
  }[s] || { bg:t.bg.surface3, fg:t.fg[3], bd:t.border.base, icon:'—' });

  const confColor = c => c >= 80 ? t.ok.base : c >= 60 ? t.warn.base : t.danger.base;
  const confBg    = c => c >= 80 ? t.ok.soft  : c >= 60 ? t.warn.soft  : t.danger.soft;
  const confBd    = c => c >= 80 ? t.ok.ring  : c >= 60 ? t.warn.ring  : t.danger.ring;

  const isAI = mode === 'ai';
  const cols = isAI
    ? '28px 100px 160px 100px 1fr 90px 80px'
    : '28px 100px 160px 100px 1fr 80px';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <HudPanel>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <Button variant="ghost" onClick={onBack}>← Back to queue</Button>
          <Bracket>{isAI ? '🤖 AI Bulk Audit' : '⚡ Bulk Regular Check'}</Bracket>
          {isAI && <span style={{ fontSize:11, fontFamily:t.font.mono, color:t.fg[3] }}>gemini-2.5-flash</span>}
          <div style={{ marginLeft:'auto', display:'flex', gap:20 }}>
            <Readout label="Passed"  value={<span>{passed}</span>}  valueKind="ok" />
            <Readout label="Failed"  value={<span>{failed}</span>}  valueKind={failed>0?'danger':undefined} />
            <Readout label="Skipped" value={<span>{skipped}</span>} valueKind={skipped>0?'warn':undefined} />
            {errors>0 && <Readout label="Errors" value={<span>{errors}</span>} valueKind="danger" />}
            {avgConf!=null && <Readout label="Avg Confidence" value={<span style={{color:confColor(avgConf)}}>{avgConf}%</span>} />}
          </div>
        </div>
      </HudPanel>

      <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden' }}>
        {/* Header */}
        <div style={{ display:'grid', gridTemplateColumns:cols, padding:'10px 14px', gap:12, borderBottom:`1px solid ${t.border.base}`, fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', color:t.fg[3] }}>
          <div/><div>Ticket</div><div>Client</div><div>Sendout ID</div><div>Summary</div>
          {isAI && <div>Confidence</div>}
          <div>Status</div>
        </div>

        {sorted.map(r => {
          const s = statusStyle(r.status);
          const isOpen = openKey === r.ticket_key;
          const overall = _extractOverall(r.report);
          const failedNames = _extractFailedNames(r.report);
          const hasConf = isAI && r.confidence >= 0;
          // Build inline summary text
          const inlineSummary = (() => {
            if (r.status === 'skipped') return 'No sendout ID found';
            if (r.error_msg) return r.error_msg.slice(0, 60) + (r.error_msg.length > 60 ? '…' : '');
            if (overall) return overall;
            if (failedNames.length > 0) return `Failed: ${failedNames.slice(0,3).join(', ')}`;
            if (r.issues_found > 0) return `${r.issues_found} issue(s) found`;
            if (r.status === 'passed') return 'All checks passed';
            return '';
          })();

          return (
            <React.Fragment key={r.ticket_key}>
              <div onClick={()=>setOpenKey(isOpen ? null : r.ticket_key)}
                style={{ display:'grid', gridTemplateColumns:cols, padding:'10px 14px', gap:12, borderBottom:`1px solid ${t.border.base}`, fontSize:13, color:t.fg[1], background:isOpen?t.bg.surface2:'transparent', cursor:'pointer', alignItems:'center' }}>
                <span style={{ fontSize:13, color:t.fg[4] }}>{isOpen?'▾':'›'}</span>
                <span style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[1], fontWeight:600 }}>{r.ticket_key}</span>
                <span style={{ color:t.fg[2], fontSize:12 }}>{r.client}</span>
                <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>{(r.sendout_id||'—').slice(0,14)}{(r.sendout_id||'').length>14?'…':''}</span>
                {/* Inline summary */}
                <span style={{ fontSize:11, color: r.status==='passed'?t.ok.base:r.status==='failed'?t.danger.base:t.fg[3], overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {inlineSummary}
                </span>
                {/* Confidence badge — AI only */}
                {isAI && (
                  hasConf
                    ? <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:11, padding:'2px 8px', borderRadius:999, background:confBg(r.confidence), color:confColor(r.confidence), border:`1px solid ${confBd(r.confidence)}`, whiteSpace:'nowrap', width:'fit-content' }}>
                        🎯 {r.confidence}%
                      </span>
                    : <span style={{ color:t.fg[4], fontSize:11 }}>—</span>
                )}
                <span style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:11, padding:'3px 8px', borderRadius:999, background:s.bg, color:s.fg, border:`1px solid ${s.bd}`, whiteSpace:'nowrap', width:'fit-content' }}>{s.icon} {r.status}</span>
              </div>

              {isOpen && (
                <div style={{ padding:'16px 20px', borderBottom:`1px solid ${t.border.base}`, background:t.bg.surface2, display:'flex', flexDirection:'column', gap:12 }}>

                  {/* AI Quick Summary Card */}
                  {isAI && (r.confidence >= 0 || r.confidence_reason || overall) && (
                    <div style={{ display:'flex', gap:16, padding:'12px 16px', borderRadius:6, background:t.bg.surface1, border:`1px solid ${t.border.base}` }}>
                      {hasConf && (
                        <div style={{ flexShrink:0, textAlign:'center' }}>
                          <div style={{ fontSize:28, fontWeight:800, fontFamily:t.font.mono, color:confColor(r.confidence), lineHeight:1 }}>{r.confidence}%</div>
                          <div style={{ fontSize:10, color:t.fg[3], marginTop:2 }}>Confidence</div>
                        </div>
                      )}
                      <div style={{ flex:1, minWidth:0 }}>
                        {overall && <div style={{ fontSize:13, fontWeight:600, color:t.fg[1], marginBottom:4 }}>{overall}</div>}
                        {r.confidence_reason && <div style={{ fontSize:12, color:t.fg[2], lineHeight:1.5 }}>{r.confidence_reason}</div>}
                        {failedNames.length > 0 && (
                          <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginTop:6 }}>
                            {failedNames.map((n,i) => (
                              <span key={i} style={{ fontSize:11, padding:'2px 7px', borderRadius:3, background:t.danger.soft, color:t.danger.base, border:`1px solid ${t.danger.ring}` }}>❌ {n}</span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* Error / skip messages */}
                  {r.error_msg && <div style={{ padding:'10px 14px', borderRadius:4, background:t.danger.soft, border:`1px solid ${t.danger.ring}`, color:t.danger.base, fontSize:12 }}>⚠️ {r.error_msg}</div>}
                  {r.status==='skipped' && <div style={{ padding:'10px 14px', borderRadius:4, background:t.warn.soft, border:`1px solid ${t.warn.ring}`, color:t.warn.base, fontSize:12 }}>No matching sendout ID found in DMA or G-Sheet.</div>}

                  {/* Regular check rows */}
                  {r.checks && r.checks.length > 0 && (
                    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                      {r.checks.map((c,i) => (
                        <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'8px 12px', borderRadius:4, background:c.ok?t.ok.soft2:t.danger.soft2, border:`1px solid ${c.ok?t.ok.soft:t.danger.soft}`, fontSize:12 }}>
                          <span style={{ flexShrink:0 }}>{c.ok?'✅':'❌'}</span>
                          <div>
                            <div style={{ fontWeight:600, color:t.fg[1], marginBottom:2 }}>{c.label}</div>
                            <div style={{ color:t.fg[2] }}>{c.detail}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Full AI report — collapsible */}
                  {r.report && isAI && (
                    <div>
                      <button onClick={e=>{e.stopPropagation();setShowReport(p=>({...p,[r.ticket_key]:!p[r.ticket_key]}));}}
                        style={{ fontSize:11, color:t.fg[3], background:'none', border:`1px solid ${t.border.base}`, borderRadius:4, padding:'4px 10px', cursor:'pointer', fontFamily:t.font.mono }}>
                        {showReport[r.ticket_key] ? '▾ Hide full report' : '› Show full report'}
                      </button>
                      {showReport[r.ticket_key] && (
                        <pre style={{ marginTop:10, fontFamily:t.font.mono, fontSize:11, color:t.fg[2], whiteSpace:'pre-wrap', wordBreak:'break-word', lineHeight:1.7, background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:4, padding:'12px 14px' }}>{r.report}</pre>
                      )}
                    </div>
                  )}
                  {r.report && !isAI && (
                    <pre style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[2], whiteSpace:'pre-wrap', wordBreak:'break-word', margin:0, lineHeight:1.7 }}>{r.report}</pre>
                  )}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   QUEUE  — sorted earliest first, Load ticket in toolbar, bulk actions
   ═════════════════════════════════════════════════════════════════════════ */
function Queue({ rows: rowsProp, onLoad, loading: queueLoading, onRefresh, token, onBulkResult, fetchError }) {
  const rows = rowsProp || [];
  const [search, setSearch] = useState('');
  const [clientFilter, setClientFilter] = useState('All clients');
  const [selected, setSelected] = useState(new Set());
  const [bulkLoading, setBulkLoading] = useState(false);
  const [bulkError, setBulkError] = useState('');

  // Sort ascending — earliest sendout date first
  const sorted = [...rows].sort((a,b) => (a.date||'').localeCompare(b.date||''));

  const clients = ['All clients', ...new Set(sorted.map(r=>r.client))];
  const filtered = sorted.filter(r=>{
    if (clientFilter!=='All clients' && r.client!==clientFilter) return false;
    if (!search) return true;
    const q=search.toLowerCase();
    return r.key.toLowerCase().includes(q)||r.summary.toLowerCase().includes(q)||r.client.toLowerCase().includes(q);
  });

  const toggle = k => { const n=new Set(selected); n.has(k)?n.delete(k):n.add(k); setSelected(n); };
  const toggleAll = () => {
    const allKeys = new Set(filtered.map(r=>r.key));
    const allSelected = [...allKeys].every(k=>selected.has(k));
    if (allSelected) setSelected(prev => { const n=new Set(prev); allKeys.forEach(k=>n.delete(k)); return n; });
    else setSelected(prev => new Set([...prev, ...allKeys]));
  };
  const selKeys = [...selected];
  const singleSel = selKeys.length===1 ? selKeys[0] : null;
  const multiSel  = selKeys.length>1;
  const singleRow = singleSel ? rows.find(r=>r.key===singleSel) : null;
  const allFilteredSelected = filtered.length>0 && filtered.every(r=>selected.has(r.key));

  const statusBadge = s => {
    const sl = (s||'').toLowerCase();
    // Green
    if (sl.includes('final check'))    return { c:t.ok.base,     bg:t.ok.soft,     border:t.ok.ring,     label:'Final Checks' };
    if (sl==='resolved'||sl==='done')  return { c:t.ok.base,     bg:t.ok.soft,     border:t.ok.ring,     label:'Done' };
    // Red
    if (sl.includes('pending'))        return { c:t.danger.base, bg:t.danger.soft, border:t.danger.ring, label:'Pending Customer' };
    // Blue
    if (sl.includes('customer replied') || sl.includes('replied')) return { c:t.accent.base, bg:t.accent.soft, border:t.accent.ring, label:'Cust. Replied' };
    // Orange / warn
    if (sl==='in progress')            return { c:t.warn.base,   bg:t.warn.soft,   border:t.warn.ring,   label:'In Progress' };
    if (sl.includes('open'))           return { c:t.brand.base,  bg:t.brand.soft,  border:t.brand.ring,  label:'Open' };
    // Grey — To Do, Waiting, unknown
    if (sl==='to do'||sl==='todo')     return { c:t.fg[3],       bg:t.bg.surface3, border:t.border.base, label:'To Do' };
    return { c:t.fg[3], bg:t.bg.surface3, border:t.border.base, label: s||'—' };
  };

  const runBulk = async (mode) => {
    setBulkLoading(true); setBulkError('');
    try {
      const endpoint = mode==='ai' ? '/api/bulk-ai-audit' : '/api/bulk-validate';
      const data = await api('POST', endpoint, { ticket_keys: selKeys }, token);
      onBulkResult(data, mode);
    } catch(e) { setBulkError(e.message); }
    finally { setBulkLoading(false); }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      {/* ── Toolbar ── */}
      <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
        <Button variant="ghost" onClick={onRefresh} disabled={queueLoading}>
          {queueLoading ? <><span className="vp-spinner" /> Loading…</> : '🔄 Refresh Queue'}
        </Button>
        <Input value={search} onChange={setSearch} placeholder="Search by key or summary…" style={{flex:1, minWidth:180}} />
        <Select value={clientFilter} onChange={setClientFilter} options={clients} style={{width:200}} />

        {/* Single selection — Load ticket */}
        {singleSel && singleRow && (
          <Button onClick={()=>onLoad(singleRow)} style={{flexShrink:0}}>
            ▶ Load {singleSel}
          </Button>
        )}

        {/* Multi selection — Bulk actions */}
        {multiSel && (
          <>
            {bulkLoading
              ? <span style={{ display:'inline-flex', alignItems:'center', gap:8, fontSize:13, color:t.fg[2] }}><span className="vp-spinner" /> Running…</span>
              : <>
                  <Button onClick={()=>runBulk('regular')} style={{flexShrink:0}}>⚡ Bulk Check ({selKeys.length})</Button>
                  <Button onClick={()=>runBulk('ai')} style={{flexShrink:0}}>🤖 AI Bulk ({selKeys.length})</Button>
                </>
            }
            <Button variant="ghost" onClick={()=>setSelected(new Set())} style={{flexShrink:0}}>✕ Clear</Button>
          </>
        )}
      </div>

      {bulkError && <div style={{ padding:'10px 14px', borderRadius:4, background:t.danger.soft, border:`1px solid ${t.danger.ring}`, color:t.danger.base, fontSize:13 }}>⚠️ {bulkError}</div>}

      <div style={{ fontSize:12, color:t.fg[3] }}>
        {filtered.length} ticket(s) · sorted by earliest date
        {selected.size>0 && <span style={{color:t.brand.text, marginLeft:12}}>{selected.size} selected</span>}
      </div>

      {rows.length===0&&!queueLoading&&(
        fetchError ? (
          <div style={{ margin:'24px 0', padding:'14px 18px', background:t.danger.soft2, border:`1px solid ${t.danger.border}`, borderRadius:6, display:'flex', alignItems:'flex-start', gap:10 }}>
            <span style={{ fontSize:16, lineHeight:1 }}>⚠️</span>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:t.danger.base, marginBottom:4 }}>Failed to load queue</div>
              <div style={{ fontSize:12, color:t.fg[2], fontFamily:t.font.mono }}>{fetchError}</div>
              <button onClick={onRefresh} style={{ marginTop:10, fontSize:12, fontWeight:600, color:t.brand.text, background:'none', border:'none', cursor:'pointer', padding:0 }}>↺ Try again</button>
            </div>
          </div>
        ) : (
          <div style={{ padding:32, textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>No tickets — click Refresh Queue</div>
        )
      )}

      {filtered.length>0&&(
        <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden' }}>
          {/* Header */}
          <div style={{ display:'grid', gridTemplateColumns:'32px 96px 1fr 150px 100px 148px', padding:'10px 14px', gap:10, borderBottom:`1px solid ${t.border.base}`, fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', color:t.fg[3], alignItems:'center' }}>
            <div><input type="checkbox" checked={allFilteredSelected} onChange={toggleAll} title="Select all" /></div>
            <div>ID</div><div>Summary</div><div>Client</div><div>Date</div><div>Status</div>
          </div>
          {filtered.map(r=>{
            const isSel = selected.has(r.key);
            const sb = statusBadge(r.status);
            return (
              <div key={r.key} onClick={()=>toggle(r.key)}
                style={{ display:'grid', gridTemplateColumns:'32px 96px 1fr 150px 100px 148px', padding:'11px 14px', gap:10, borderBottom:`1px solid ${t.border.base}`, fontSize:13, color:t.fg[1], background:isSel?t.brand.soft:'transparent', cursor:'pointer', transition:'background .12s', alignItems:'center' }}>
                <div onClick={e=>e.stopPropagation()}>
                  <input type="checkbox" checked={isSel} onChange={()=>toggle(r.key)} />
                </div>
                <div style={{ fontFamily:t.font.mono, fontSize:12 }}>{r.key}</div>
                <div style={{ whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', fontSize:13 }}>{r.summary}</div>
                <div style={{ color:t.fg[2], fontSize:12, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.client}</div>
                <div style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[2] }}>{r.date}</div>
                <div>
                  <span style={{ fontSize:11, fontWeight:600, fontFamily:t.font.sans, padding:'3px 9px', borderRadius:999, background:sb.bg, border:`1px solid ${sb.border}`, color:sb.c, whiteSpace:'nowrap', display:'inline-block' }} title={r.status}>
                    {sb.label}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   EXAMPLE SAVE MODAL
   ═════════════════════════════════════════════════════════════════════════ */
function ExampleSaveModal({ checkKey, checkData, comparisonData, client, token, onClose, onSaved }) {
  const LABELS = {scheduling:'Scheduling',copy:'Copy',footer:'Footer',cta:'CTA',tags:'Tags',images:'Images'};
  const [form, setForm] = React.useState({
    scenario: '',
    verdict:  checkData?.verdict  || 'PASS',
    reason:   checkData?.reason   || '',
    expected: checkData?.expected || '',
    actual:   checkData?.actual   || '',
  });
  const [saving, setSaving] = React.useState(false);
  const [err,    setErr]    = React.useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = async () => {
    if (!form.scenario.trim()) { setErr('Please add a scenario description'); return; }
    setSaving(true); setErr('');
    try {
      await api('POST', '/api/examples', {
        client, check: checkKey,
        scenario: form.scenario.trim(),
        verdict:  form.verdict,
        reason:   form.reason,
        expected: form.expected,
        actual:   form.actual,
        comparison_data: comparisonData,
      }, token);
      onSaved && onSaved();
      onClose();
    } catch(e) { setErr(e.message || String(e) || 'Unknown error — check browser console'); }
    finally { setSaving(false); }
  };

  const inp = (extra={}) => ({
    style:{ width:'100%', boxSizing:'border-box', padding:'7px 10px', borderRadius:4,
            border:`1px solid ${t.border.base}`, background:t.bg.surface2,
            color:t.fg[0], fontSize:12, fontFamily:t.font.mono },
    ...extra,
  });

  return (
    <div onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}
         style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:9999,
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:10,
                    padding:28, width:540, maxWidth:'94vw', maxHeight:'90vh', overflowY:'auto',
                    display:'flex', flexDirection:'column', gap:14, boxShadow:'0 8px 40px rgba(0,0,0,.4)' }}>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:14, fontWeight:700, color:t.fg[0] }}>
            💾 Save as AI Example — {LABELS[checkKey]||checkKey}
          </div>
          <button onClick={onClose} style={{ background:'none',border:'none',cursor:'pointer',color:t.fg[3],fontSize:18 }}>✕</button>
        </div>

        {/* Client + Check (readonly) */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
          {[['CLIENT', client], ['CHECK TYPE', checkKey]].map(([lbl,val])=>(
            <div key={lbl}>
              <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:3, textTransform:'uppercase', letterSpacing:'.06em' }}>{lbl}</div>
              <div style={{ fontSize:12, color:t.fg[1], padding:'6px 10px', background:t.bg.surface2, borderRadius:4, fontFamily:t.font.mono }}>{val}</div>
            </div>
          ))}
        </div>

        {/* Scenario */}
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:3, textTransform:'uppercase', letterSpacing:'.06em' }}>
            SCENARIO DESCRIPTION <span style={{color:t.danger.base}}>*</span>
          </div>
          <input {...inp()} value={form.scenario} onChange={e=>set('scenario',e.target.value)}
            placeholder="e.g. Wrong segment excluded — familien instead of grillen" />
          <div style={{ fontSize:10, color:t.fg[4], marginTop:3 }}>Short description of what makes this case noteworthy — used as prompt label.</div>
        </div>

        {/* Verdict */}
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:3, textTransform:'uppercase', letterSpacing:'.06em' }}>VERDICT (edit if AI got it wrong)</div>
          <select value={form.verdict} onChange={e=>set('verdict',e.target.value)}
            style={{ padding:'7px 10px', borderRadius:4, border:`1px solid ${t.border.base}`, background:t.bg.surface2, color:t.fg[0], fontSize:12 }}>
            <option value="PASS">✅ PASS</option>
            <option value="FAIL">❌ FAIL</option>
            <option value="NA">🔕 NA</option>
          </select>
        </div>

        {/* Reason / Expected / Actual */}
        {['reason','expected','actual'].map(field=>(
          <div key={field}>
            <div style={{ fontSize:10, fontWeight:700, color:t.fg[3], marginBottom:3, textTransform:'uppercase', letterSpacing:'.06em' }}>{field}</div>
            <textarea {...inp()} value={form[field]} onChange={e=>set(field,e.target.value)} rows={2}
              style={{ ...inp().style, resize:'vertical', fontFamily:t.font.mono }} />
          </div>
        ))}

        {err && <div style={{ padding:'8px 12px', borderRadius:4, background:t.danger.soft, color:t.danger.base, fontSize:12, border:`1px solid ${t.danger.ring}` }}>{err}</div>}

        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
          <Button variant="ghost" onClick={onClose}>Cancel</Button>
          <Button onClick={save} disabled={saving}>{saving ? 'Saving…' : '💾 Save Example'}</Button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   TICKET PANEL — wired to real API
   ═════════════════════════════════════════════════════════════════════════ */
function TicketPanel({ ticket, clients, token, onBack }) {
  const [tab, setTab] = useState('Setup');
  const [client, setClient] = useState(ticket.client);
  const [ticketKey, setTicketKey] = useState(ticket.key);
  const [sendoutId, setSendoutId] = useState('');
  const [sendouts, setSendouts] = useState([]);
  const [sendoutsLoading, setSendoutsLoading] = useState(false);

  // Enrich data (auto-matched sendout + G-Sheet fields)
  const [enrichData, setEnrichData]     = useState(null);
  const [enrichLoading, setEnrichLoading] = useState(false);
  const [autoMatched, setAutoMatched]   = useState(false);

  const [validateResult, setValidateResult] = useState(null);
  const [aiResult, setAiResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [saveModal, setSaveModal] = useState(null);  // {checkKey, checkData, comparisonData}

  // Fetch sendouts + run enrich when client changes
  useEffect(()=>{
    if (!client) return;
    setSendoutsLoading(true); setEnrichLoading(true);
    setSendouts([]); setEnrichData(null); setAutoMatched(false);

    // Run sendout fetch and enrich in parallel
    const sendoutFetch = api('GET', `/api/sendouts/${encodeURIComponent(client)}`, null, token)
      .catch(() => []);

    const enrichFetch = api('POST', '/api/ticket/enrich', {
      client,
      ticket_key: ticket.key,
      jira_date:    ticket.date,
      jira_summary: ticket.summary,
    }, token)
      .then(d => { setEnrichData(d); return d; })
      .catch(() => null)
      .finally(() => setEnrichLoading(false));

    Promise.all([sendoutFetch, enrichFetch])
      .then(([sendoutData, enrichResult]) => {
        setSendouts(sendoutData);
        if (enrichResult && enrichResult.sendout_id) {
          setSendoutId(enrichResult.sendout_id);
          setAutoMatched(true);
        } else if (sendoutData.length > 0) {
          setSendoutId(sendoutData[0].id);
          setAutoMatched(false);
        }
      })
      .finally(() => setSendoutsLoading(false));
  }, [client, token]);

  // Helper: build tag fields for API calls — registry takes priority over G-Sheet; dedup tags
  // NOTE: server ValidateRequest / AiAuditRequest use "exclude_tags" (not "gsheet_exclude_tags")
  const dedup = str => [...new Set((str||'').split(',').map(s=>s.trim()).filter(Boolean))].join(', ');
  const gsheetBody = enrichData ? {
    gsheet_tags:  dedup(enrichData.tags_source === 'registry' ? enrichData.gsheet_tags : enrichData.gsheet_tags),
    exclude_tags: dedup(enrichData.tags_source === 'registry' ? enrichData.gsheet_exclude_tags : enrichData.gsheet_exclude_tags),
    leaflet_url:  enrichData.leaflet_url || '',
  } : {};

  const runValidate = async () => {
    setLoading(true); setError(''); setValidateResult(null);
    try {
      const res = await api('POST', '/api/validate',
        { client, ticket_key: ticketKey, sendout_id: sendoutId, ...gsheetBody }, token);
      setValidateResult(res);
      setTab('Results');
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const runAiAudit = async () => {
    setLoading(true); setError(''); setAiResult(null);
    try {
      const res = await api('POST', '/api/ai-audit',
        { client, ticket_key: ticketKey, sendout_id: sendoutId, ...gsheetBody }, token);
      setAiResult(res);
      setTab('AI Audit');
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const tabs = ['Setup', 'Results', 'AI Audit'];
  const _today7 = (() => {
    const d = new Date(); d.setDate(d.getDate() + 7);
    return [new Date().toISOString().slice(0,10), d.toISOString().slice(0,10)];
  })();
  const _visibleSendouts = sendouts.filter(s => {
    if (!s.date) return false;
    return s.date >= _today7[0] && s.date <= _today7[1];
  });
  const sendoutOptions = _visibleSendouts.map(s=>({ value:s.id, label:`${s.date}  |  ${s.name}  |  ${s.id}` }));
  if (sendoutOptions.length===0) sendoutOptions.push({ value:'', label:'— no sendouts within 7 days —' });

  return (
    <>
    <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
      {/* HUD bar */}
      <HudPanel>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <Button variant="ghost" onClick={onBack}>← Back to queue</Button>
            <div style={{ display:'flex', alignItems:'center', gap:8, fontFamily:t.font.mono, fontSize:12, color:t.fg[3] }}>
              <Led kind="accent" pulse />
              <span style={{color:t.brand.text, fontWeight:600, letterSpacing:'0.04em'}}>{ticketKey}</span>
              <span>·</span>
              <span>{client}</span>
              <span>·</span>
              <span>{ticket.date}</span>
            </div>
            <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
              {loading&&<span className="vp-spinner" />}
              <Button variant="ghost" onClick={runValidate} disabled={loading||!sendoutId}>⚡ Regular Check</Button>
              <Button onClick={runAiAudit} disabled={loading||!sendoutId}>🤖 Run AI Audit</Button>
            </div>
          </div>
          <div style={{ fontSize:16, fontWeight:700, color:t.fg[1], letterSpacing:'-0.01em', lineHeight:1.3, paddingLeft:2 }}>
            {ticket.summary || <span style={{ color:t.fg[3], fontWeight:400, fontStyle:'italic' }}>No summary</span>}
          </div>
        </div>
      </HudPanel>

      {/* Sub-nav */}
      <div style={{ position:'sticky', top:0, zIndex:50, background:t.bg.app, padding:'4px 0' }}>
        <div style={{ display:'flex', gap:4, background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:8, padding:5, maxWidth:500 }}>
          {tabs.map(tb=><NavPill key={tb} active={tab===tb} onClick={()=>setTab(tb)}>{tb}</NavPill>)}
        </div>
      </div>

      {error&&<div style={{ padding:'12px 16px', borderRadius:4, background:t.danger.soft, border:`1px solid ${t.danger.ring}`, color:t.danger.base, fontSize:13 }}>⚠️ {error}</div>}

      {tab==='Setup'&&(
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <SectionHeader style={{marginTop:8}}>Control panel</SectionHeader>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div>
              <div style={{ fontSize:13, color:t.fg[1], marginBottom:6 }}>🎯 Client Context</div>
              <Select value={client} onChange={setClient} options={clients} />
            </div>
            <div>
              <div style={{ fontSize:13, color:t.fg[1], marginBottom:6 }}>🎫 Ticket ID</div>
              <Input value={ticketKey} onChange={setTicketKey} placeholder="MAS-XXXX" />
            </div>
          </div>
          <div>
            <div style={{ fontSize:13, color:t.fg[1], marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
              📋 DMA Sendout
              {(sendoutsLoading||enrichLoading) && <span style={{ fontFamily:t.font.mono, fontSize:11, color:t.fg[3] }}>(loading…)</span>}
              {autoMatched && !sendoutsLoading && !enrichLoading && (
                <span style={{ display:'inline-flex', alignItems:'center', gap:4, fontFamily:t.font.mono, fontSize:10, padding:'2px 8px', borderRadius:999, background:t.ok.soft, color:t.ok.base, border:`1px solid ${t.ok.ring}` }}>
                  ✅ auto-matched by date
                </span>
              )}
            </div>
            <Select value={sendoutId} onChange={v=>{ setSendoutId(v); setAutoMatched(false); }} options={sendoutOptions} />
          </div>
          {sendoutId&&(
            <div style={{ display:'flex', alignItems:'center', gap:14, flexWrap:'wrap' }}>
              <div style={{ fontSize:11, color:t.fg[3] }}>Sendout ID: <code style={{ fontFamily:t.font.mono, background:t.bg.surface3, padding:'1px 5px', borderRadius:3, fontSize:11, color:t.fg[2] }}>{sendoutId}</code></div>
              {enrichData && (() => {
                const src = enrichData.tags_source;
                const incl = (enrichData.gsheet_tags||'').split(',').filter(s=>s.trim()).length;
                const excl = (enrichData.gsheet_exclude_tags||'').split(',').filter(s=>s.trim()).length;
                if (src === 'registry') return (
                  <div style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'2px 8px', borderRadius:999, background:t.brand.soft, border:`1px solid ${t.brand.ring}`, fontSize:11, fontWeight:600, color:t.brand.text }}>
                    📝 Registry tags: {incl} include / {excl} exclude
                    <span style={{ opacity:.6, fontWeight:400 }}>· G-Sheet ignored</span>
                  </div>
                );
                if (src === 'gsheet' && (incl > 0 || excl > 0)) return (
                  <div style={{ fontSize:11, color:t.fg[3] }}>
                    📋 G-Sheet tags: <span style={{ color:t.fg[2] }}>{incl} include / {excl} exclude</span>
                  </div>
                );
                return null;
              })()}
              {enrichData && enrichData.leaflet_url && (
                <div style={{ fontSize:11, color:t.fg[3] }}>🔗 Leaflet: <a href={enrichData.leaflet_url} target="_blank" rel="noopener" style={{ color:t.brand.text, textDecoration:'none' }}>linked</a></div>
              )}
            </div>
          )}
          <div style={{ marginTop:8, display:'flex', gap:12 }}>
            <Button onClick={runValidate} disabled={loading||!sendoutId}>{loading?<><span className="vp-spinner" /> Running…</>:'⚡ Run Regular Check'}</Button>
            <Button onClick={runAiAudit} disabled={loading||!sendoutId} variant="ghost">{loading?'…':'🤖 Run AI Audit'}</Button>
          </div>
        </div>
      )}

      {tab==='Results'&&(
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {!validateResult&&<div style={{ padding:32, textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>Run Regular Check to see results here.</div>}
          {validateResult&&(
            <>
              {/* ── Feature 1: Schedule check banner ── */}
              {validateResult.schedule_check && (
                <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 16px', borderRadius:5, background: validateResult.schedule_check.ok ? t.ok.soft2 : t.danger.soft2, border:`1px solid ${validateResult.schedule_check.ok ? t.ok.border : t.danger.border}`, fontSize:13 }}>
                  <span style={{ fontSize:15, flexShrink:0 }}>{validateResult.schedule_check.ok ? '✅' : '❌'}</span>
                  <div>
                    <span style={{ fontWeight:600, color: validateResult.schedule_check.ok ? t.ok.base : t.danger.base }}>
                      {validateResult.schedule_check.ok ? 'Schedule OK' : 'Schedule mismatch'}
                    </span>
                    {validateResult.schedule_check.detail && (
                      <span style={{ color:t.fg[2], marginLeft:10, fontSize:12 }}>
                        {/* strip leading ✅/❌ that features.py already prepends */}
                        {validateResult.schedule_check.detail.replace(/^[✅❌⚠️]\s*/u, '')}
                      </span>
                    )}
                  </div>
                </div>
              )}
              <div className="result-frame" dangerouslySetInnerHTML={{ __html: validateResult.html }} />
            </>
          )}
        </div>
      )}

      {tab==='AI Audit'&&(
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {!aiResult&&<div style={{ padding:32, textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>Run AI Audit to see results here. This may take 20–40 seconds.</div>}
          {aiResult&&(
            <>
              {/* Gemini 503 / overloaded — friendly retry banner */}
              {aiResult.overloaded ? (
                <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:6, background:t.warn.soft2, border:`1px solid ${t.warn.ring}`, color:t.warn.base }}>
                  <span style={{ fontSize:22 }}>⏳</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:13, marginBottom:3 }}>AI model temporarily busy</div>
                    <div style={{ fontSize:12 }}>{aiResult.summary}</div>
                  </div>
                  <Button variant="ghost" onClick={runAiAudit}>↺ Retry</Button>
                </div>
              ) : (
              <>
              {/* ── Status + Confidence badge ── */}
              <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
                {aiResult.issues > 0
                  ? <Badge kind="danger">{aiResult.issues} issue(s) found</Badge>
                  : <Badge kind="ok">All checks passed</Badge>}

                {aiResult.confidence != null && aiResult.confidence >= 0 && (() => {
                  const pct = Math.round(aiResult.confidence);
                  const low = pct < 60;
                  return (
                    <div style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'3px 10px', borderRadius:999, fontSize:11, fontWeight:600, background: low ? t.warn.soft : t.ok.soft, color: low ? t.warn.base : t.ok.base, border:`1px solid ${low ? t.warn.ring : t.ok.ring}` }}>
                      🎯 Confidence: {pct}%{low ? ' — low, review manually' : ''}
                    </div>
                  );
                })()}
              </div>

              {/* Low-confidence warning */}
              {aiResult.confidence != null && aiResult.confidence >= 0 && aiResult.confidence < 60 && (
                <div style={{ padding:'10px 14px', borderRadius:4, background:t.warn.soft, border:`1px solid ${t.warn.ring}`, color:t.warn.base, fontSize:12 }}>
                  ⚠️ AI confidence is below 60% — the result may be unreliable. Consider reviewing the sendout manually before approving.
                </div>
              )}

              {/* ── Per-check verdict strip with 💾 Save buttons ── */}
              {aiResult.structured && (() => {
                const CHECK_KEYS = ['scheduling','copy','footer','cta','tags','images'];
                const LABELS = {scheduling:'Scheduling',copy:'Copy',footer:'Footer',cta:'CTA',tags:'Tags',images:'Images'};
                return (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6, padding:'10px 14px', background:t.bg.surface2, borderRadius:6, border:`1px solid ${t.border.base}`, alignItems:'center' }}>
                    {CHECK_KEYS.map(key => {
                      const chk = aiResult.structured[key];
                      if (!chk) return null;
                      const v = chk.verdict;
                      const emoji = v==='PASS'?'✅':v==='FAIL'?'❌':'🔕';
                      const bg  = v==='PASS'?t.ok.soft :v==='FAIL'?t.danger.soft :t.bg.surface3;
                      const bd  = v==='PASS'?t.ok.ring :v==='FAIL'?t.danger.ring :t.border.base;
                      const clr = v==='PASS'?t.ok.base :v==='FAIL'?t.danger.base :t.fg[3];
                      return (
                        <div key={key} title={chk.reason||''}
                          style={{ display:'inline-flex', alignItems:'center', gap:3, background:bg, border:`1px solid ${bd}`, borderRadius:4, padding:'3px 8px', fontSize:11, fontWeight:600, color:clr }}>
                          {emoji} {LABELS[key]}
                          <button
                            onClick={()=>setSaveModal({checkKey:key, checkData:chk, comparisonData:aiResult.comparison_data})}
                            title="Save as AI training example"
                            style={{ marginLeft:3, background:'none', border:'none', cursor:'pointer', color:t.fg[3], fontSize:11, lineHeight:1, padding:'1px 3px', borderRadius:2, opacity:.7 }}>
                            💾
                          </button>
                        </div>
                      );
                    })}
                    <span style={{ fontSize:10, color:t.fg[4], marginLeft:'auto' }}>💾 save check as AI training example</span>
                  </div>
                );
              })()}

              <div className="result-frame" dangerouslySetInnerHTML={{ __html: aiResult.html }} />
              </>
              )}
            </>
          )}
        </div>
      )}
    </div>

    {/* ── Save Example Modal — at fragment root so it's never trapped in conditionals ── */}
    {saveModal && (
      <ExampleSaveModal
        checkKey={saveModal.checkKey}
        checkData={saveModal.checkData}
        comparisonData={saveModal.comparisonData}
        client={client}
        token={token}
        onClose={()=>setSaveModal(null)}
        onSaved={()=>setSaveModal(null)}
      />
    )}
    </>
  );
}

function FailureRow({ label, count }) {

}

function DashMini({ label, value, sub, kind='neutral', icon }) {
  const clr = { ok:t.ok.base, danger:t.danger.base, warn:t.warn.base, accent:t.accent.base, brand:t.brand.base, neutral:t.fg[1] }[kind] || t.fg[1];
  const bg  = { ok:t.ok.soft, danger:t.danger.soft, warn:t.warn.soft, accent:t.accent.soft, brand:t.brand.soft, neutral:t.bg.surface2 }[kind] || t.bg.surface2;
  const bd  = { ok:t.ok.ring, danger:t.danger.ring, warn:t.warn.ring, accent:t.accent.ring, brand:t.brand.ring, neutral:t.border.base }[kind] || t.border.base;

      </div>

      {sub && <div style={{ fontSize:11, color:t.fg[3], fontFamily:t.font.mono, marginTop:2 }}>{sub}</div>}

function DashBar({ label, value, max, kind='ok', count }) {
  const pct = max > 0 ? Math.min(100, Math.round(value / max * 100)) : 0;
  const clr = { ok:t.ok.base, danger:t.danger.base, warn:t.warn.base, accent:t.accent.base, brand:t.brand.base }[kind] || t.ok.base;
  const bg  = { ok:t.ok.soft, danger:t.danger.soft, warn:t.warn.soft, accent:t.accent.soft, brand:t.brand.soft }[kind] || t.ok.soft;
  return (
    <div style={{ display:'grid', gridTemplateColumns:'160px 1fr 40px', alignItems:'center', gap:10, padding:'5px 0' }}>
      <span style={{ fontSize:12, color:t.fg[2], whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{label}</span>
      <div style={{ height:8, borderRadius:4, background:t.bg.surface3, overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${pct}%`, background:clr, borderRadius:4, transition:'width .3s' }} />
      </div>
      <span style={{ fontSize:12, fontFamily:t.font.mono, color:clr, textAlign:'right' }}>{count != null ? count : value}</span>
    </div>
  );
}

function DashTimeline({ daily }) {
  const days = [];
  const now = new Date();
  for (let i = 13; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const lbl = d.toLocaleDateString('en', { month:'short', day:'numeric' });
    const entry = daily[key] || { passed:0, failed:0 };
    days.push({ key, lbl, ...entry, total:(entry.passed||0)+(entry.failed||0) });
  }
  const maxVal = Math.max(1, ...days.map(d => d.total));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:4, height:80, padding:'0 4px' }}>
      {days.map(d => {
        const h = Math.max(4, Math.round(d.total / maxVal * 72));
        const isToday = d.key === new Date().toISOString().slice(0,10);
        const hasData = d.total > 0;
        return (
          <div key={d.key} title={`${d.lbl}: ${d.passed} passed, ${d.failed} failed`}
            style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'default' }}>
            <div style={{ width:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', height:72 }}>
              {hasData ? (
                <div style={{ width:'100%', height:h, borderRadius:'3px 3px 0 0', overflow:'hidden', display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
                  {d.failed > 0 && <div style={{ height:`${Math.round(d.failed/d.total*100)}%`, background:t.danger.base, opacity:.85 }} />}
                  {d.passed > 0 && <div style={{ height:`${Math.round(d.passed/d.total*100)}%`, background:t.ok.base }} />}
                </div>
              ) : (
                <div style={{ width:'100%', height:3, borderRadius:2, background:t.bg.surface3 }} />
              )}
            </div>
            <span style={{ fontSize:9, color: isToday ? t.brand.base : t.fg[4], fontFamily:t.font.mono, whiteSpace:'nowrap',
              fontWeight: isToday ? 700 : 400 }}>
              {d.lbl.split(' ')[1]}{isToday ? '★' : ''}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function Dashboard({ token }) {
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [refresh, setRefresh] = useState(0);

  useEffect(() => {
    setLoading(true);
    api('GET', '/api/dashboard', null, token)
      .then(setData).catch(() => {}).finally(() => setLoading(false));
  }, [token, refresh]);

  const d = data || {};
  const recent = d.recent || [];
  const qh = d.queue_health || {};
  const topFailed = d.top_failed_checks || [];
  const byClient = d.by_client || {};
  const byUser = d.by_user || {};
  const daily = d.daily_counts || {};
  const maxFailed = topFailed.length > 0 ? topFailed[0].count : 1;
  const clientsByFail = Object.entries(byClient).sort((a,b)=>b[1].failed-a[1].failed).slice(0,6);
  const maxClientFail = clientsByFail.length > 0 ? (clientsByFail[0][1].failed||1) : 1;
  const userRows = Object.entries(byUser).sort((a,b)=>b[1].total-a[1].total);

  const pct = (n, d2) => d2 > 0 ? Math.round(n / d2 * 100) : 0;
  const fmt = v => v != null ? v : '—';
  const spin = loading && !data;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      {/* Refresh button */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:-8 }}>
        <div style={{ fontSize:12, color:t.fg[3], fontFamily:t.font.mono }}>
          {spin ? 'Loading…' : `${d.total||0} total validations recorded`}
        </div>
        <Button variant="ghost" onClick={()=>setRefresh(r=>r+1)} style={{ fontSize:11 }}>↻ Refresh</Button>
      </div>

      {/* ── Today at a Glance ─────────────────────────────────────────────── */}
      <div>
        <SectionHeader style={{ marginTop:0 }}>⚡ Today at a Glance</SectionHeader>

            <DashMini label="Passed"    value={spin?'…':fmt(d.week_passed)} kind="ok" />

        <SectionHeader style={{ marginTop:0 }}>📈 14-Day Timeline</SectionHeader>

        <div>
          <SectionHeader style={{ marginTop:0 }}>🔍 Most Common Failed Checks</SectionHeader>

            {spin && <div style={{ color:t.fg[3], fontSize:12 }}>Loading…</div>}

          <SectionHeader style={{ marginTop:0 }}>🏢 Failures by Client</SectionHeader>

            kind={d.ai_avg_confidence>=80?'ok':d.ai_avg_confidence>=60?'warn':'neutral'} icon="🎯" sub="gemini-2.5-pro" />
          <DashMini label="Low Confidence (<60%)" value={spin?'…':fmt(d.ai_low_confidence)}
            kind={d.ai_low_confidence>0?'danger':'neutral'} icon="⚠️" />
        </div>
      </div>

      {/* ── Team Activity ─────────────────────────────────────────────────── */}
      {userRows.length > 0 && (
        <div>
          <SectionHeader style={{ marginTop:0 }}>👥 Team Activity</SectionHeader>
          <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 60px 60px 60px 80px', gap:0, padding:'8px 16px', borderBottom:`1px solid ${t.border.base}`, fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'.07em', color:t.fg[3] }}>
              <span>User</span><span style={{textAlign:'right'}}>Total</span><span style={{textAlign:'right'}}>Passed</span><span style={{textAlign:'right'}}>Failed</span><span style={{textAlign:'right'}}>Pass %</span>
            </div>
            {userRows.map(([name, s], i) => {
              const rate = pct(s.passed, s.total);
              return (
                <div key={name} style={{ display:'grid', gridTemplateColumns:'1fr 60px 60px 60px 80px', gap:0, padding:'9px 16px', borderBottom: i<userRows.length-1?`1px solid ${t.border.base}`:'none', fontSize:13, alignItems:'center', background: i%2===0?'transparent':t.bg.surface2 }}>
                  <span style={{ fontWeight:600, color:t.fg[1] }}>{name}</span>
                  <span style={{ textAlign:'right', fontFamily:t.font.mono, color:t.fg[2] }}>{s.total}</span>
                  <span style={{ textAlign:'right', fontFamily:t.font.mono, color:t.ok.base }}>{s.passed}</span>
                  <span style={{ textAlign:'right', fontFamily:t.font.mono, color:s.failed>0?t.danger.base:t.fg[3] }}>{s.failed}</span>
                  <div style={{ display:'flex', alignItems:'center', gap:6, justifyContent:'flex-end' }}>
                    <div style={{ width:36, height:5, borderRadius:3, background:t.bg.surface3, overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${rate}%`, background: rate>=80?t.ok.base:rate>=60?t.warn.base:t.danger.base, borderRadius:3 }} />
                    </div>
                    <span style={{ fontSize:11, fontFamily:t.font.mono, color:rate>=80?t.ok.base:rate>=60?t.warn.base:t.danger.base, minWidth:32, textAlign:'right' }}>{rate}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Audit Log ─────────────────────────────────────────────────────── */}
      <div>
        <SectionHeader style={{ marginTop:0 }}>📋 Audit Log</SectionHeader>
        {spin && <div style={{ padding:24, textAlign:'center', color:t.fg[3], fontSize:12 }}>Loading…</div>}
        {!spin && recent.length === 0 && (
          <div style={{ padding:24, textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>No validations recorded yet.</div>
        )}
        {recent.length > 0 && (
          <div style={{ background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'100px 100px 90px 100px 1fr', gap:0, padding:'7px 14px', borderBottom:`1px solid ${t.border.base}`, fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:t.fg[3] }}>
              <span>Time</span><span>Ticket</span><span>Mode</span><span>User</span><span>Result</span>
            </div>
            {recent.map((l, i) => {
              const isPass = l.status === 'passed' || l.status === 'pass';
              const isFail = l.status === 'failed' || l.status === 'fail';
              const dot = isPass ? t.ok.base : isFail ? t.danger.base : t.fg[3];
              const ts = (l.timestamp || '').slice(11, 16);
              const fc = (l.failed_checks || []).slice(0, 3).join(', ');
              return (
                <div key={i} style={{ display:'grid', gridTemplateColumns:'100px 100px 90px 100px 1fr', gap:0, padding:'7px 14px', borderBottom:i<recent.length-1?`1px solid ${t.border.base}`:'none', fontSize:12, alignItems:'center', background: i%2===0?'transparent':t.bg.surface2 }}>
                  <span style={{ fontFamily:t.font.mono, color:t.fg[3], fontSize:11 }}>{ts}</span>
                  <span style={{ fontFamily:t.font.mono, color:t.brand.base, fontSize:11 }}>{l.ticket_key||'—'}</span>
                  <span style={{ fontSize:11, padding:'2px 7px', borderRadius:3, background: l.mode==='ai'?t.accent.soft:t.bg.surface3, color: l.mode==='ai'?t.accent.base:t.fg[2], border:`1px solid ${l.mode==='ai'?t.accent.ring:t.border.base}`, display:'inline-block', width:'fit-content' }}>
                    {l.mode==='ai'?'🤖 AI':'📋 Rule'}
                  </span>
                  <span style={{ color:t.fg[2], fontSize:12 }}>{l.user||'—'}</span>
                  <span style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <span style={{ width:7, height:7, borderRadius:'50%', background:dot, flexShrink:0, boxShadow:`0 0 4px ${dot}66` }} />
                    <span style={{ color: isPass?t.ok.base:isFail?t.danger.base:t.fg[2], fontWeight: isPass||isFail?600:400 }}>
                      {isPass?'Passed':isFail?'Failed':l.status||'—'}
                    </span>
                    {fc && <span style={{ color:t.fg[3], fontSize:11, fontFamily:t.font.mono }}>· {fc}</span>}
                    {l.confidence != null && <span style={{ marginLeft:'auto', fontSize:10, fontFamily:t.font.mono, color:l.confidence>=80?t.ok.base:l.confidence>=60?t.warn.base:t.danger.base }}>{l.confidence}%</span>}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ORPHAN SCANNER — full implementation
   ═════════════════════════════════════════════════════════════════════════ */
const STATUS_META = {
  no_jira:   { icon:'🔴', label:'Missing from JIRA',    bg: t.danger.soft,  bd: t.danger.ring,  fg: t.danger.base  },
  no_gsheet: { icon:'🟡', label:'Missing from G-Sheet', bg: t.warn.soft,    bd: t.warn.ring,    fg: t.warn.base    },
  auto:      { icon:'🔵', label:'Automated (no JIRA)',  bg: t.info.soft,    bd: t.info.ring,    fg: t.brand.text   },
  ok:        { icon:'🟢', label:'Matched',              bg: t.ok.soft,      bd: t.ok.ring,      fg: t.ok.base      },
};

function OrphanRow({ r }) {
  const [open, setOpen] = useState(false);
  const m = STATUS_META[r.status] || STATUS_META.ok;
  return (
    <div style={{ border:`1px solid ${t.border.base}`, borderRadius:6, marginBottom:8, overflow:'hidden' }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px', cursor:'pointer', background: open ? t.bg.surface2 : t.bg.surface1, userSelect:'none' }}>
        <span style={{ fontSize:14 }}>{open ? '▾' : '›'}</span>
        <span style={{ fontFamily:t.font.mono, fontSize:12, color:t.fg[3], minWidth:90 }}>{r.date}</span>
        <span style={{ fontWeight:600, color:t.fg[1], fontSize:13 }}>{r.client}</span>
        {r.config_ok === true  && <Badge kind="ok"     style={{fontSize:10}}>config ✓</Badge>}
        {r.config_ok === false && <Badge kind="danger" style={{fontSize:10}}>config ✗</Badge>}
        <span style={{ color:t.fg[2], fontSize:13, flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.name}</span>
        <span style={{ fontSize:11, padding:'3px 10px', borderRadius:999, background:m.bg, color:m.fg, border:`1px solid ${m.bd}`, whiteSpace:'nowrap' }}>{r.icon || m.icon} {r.in_jira ? '✅ JIRA' : '❌ JIRA'} · {r.in_gsheet ? '✅ G-Sheet' : '❌ G-Sheet'}</span>
      </div>
      {open && (
        <div style={{ padding:'14px 20px', borderTop:`1px solid ${t.border.base}`, background:t.bg.surface2, display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div style={{ fontSize:13, color:t.fg[2] }}><strong>Name:</strong> {r.name}</div>
            <div style={{ fontSize:13, fontFamily:t.font.mono, color:t.fg[2] }}><strong>ID:</strong> {r.id}</div>
          </div>
          {r.filters && r.filters.length > 0 && (
            <div style={{ fontSize:12, color:t.fg[2] }}>
              <Overline style={{ marginBottom:6 }}>Filters</Overline>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {r.filters.map((f,i) => {
                  const isExcl = /^excl:/i.test(f.trim());
                  const isIncl = /^incl:/i.test(f.trim());
                  const bg  = isExcl ? t.danger.soft  : isIncl ? t.ok.soft  : t.bg.surface3;
                  const fg  = isExcl ? t.danger.base  : isIncl ? t.ok.base  : t.fg[1];
                  const bd  = isExcl ? t.danger.ring  : isIncl ? t.ok.ring  : t.border.base;
                  return (
                    <span key={i} style={{ fontFamily:t.font.mono, fontSize:11, padding:'2px 8px', borderRadius:3, background:bg, color:fg, border:`1px solid ${bd}` }}>
                      {f}
                    </span>
                  );
                })}
              </div>
            </div>
          )}
          {r.status === 'no_jira' && (
            <div style={{ padding:'10px 14px', borderRadius:4, background:t.danger.soft2, border:`1px solid ${t.danger.ring}`, color:t.danger.base, fontSize:12 }}>
              ⚠️ No matching JIRA ticket — this sendout may have been created directly in DMA without going through the approval process.
            </div>
          )}
          {r.status === 'no_gsheet' && (
            <div style={{ padding:'10px 14px', borderRadius:4, background:t.warn.soft, border:`1px solid ${t.warn.ring}`, color:t.warn.base, fontSize:12 }}>
              ⚠️ No matching G-Sheet row for this date.
            </div>
          )}
          {r.status === 'auto' && (
            <div style={{ padding:'10px 14px', borderRadius:4, background:t.info.soft, border:`1px solid ${t.info.ring}`, color:t.brand.text, fontSize:12 }}>
              ℹ️ Automated sendout — no JIRA ticket required.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function OrphanScanner({ token }) {
  const [daysAhead, setDaysAhead] = useState(7);
  const [loading, setLoading]     = useState(false);
  const [scanData, setScanData]   = useState(null);   // {results, jira_count, gsheet_count}
  const [showOk, setShowOk]       = useState(false);
  const [error, setError]         = useState('');

  const runScan = async () => {
    setLoading(true); setError(''); setScanData(null);
    try {
      const data = await api('GET', `/api/orphan-scan?days_ahead=${daysAhead}&days_back=0`, null, token);
      // Handle both old (array) and new (object) response shapes
      if (Array.isArray(data)) setScanData({ results: data, jira_count: null, gsheet_count: null });
      else setScanData(data);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const results   = scanData ? scanData.results : null;
  const orphans   = results ? results.filter(r => r.status === 'no_jira' || r.status === 'no_gsheet') : [];
  const autoCount = results ? results.filter(r => r.status === 'auto').length : 0;
  const okCount   = results ? results.filter(r => r.status === 'ok').length : 0;
  const displayed = results ? (showOk ? results : orphans) : [];

  const exportCsv = () => {
    if (!results) return;
    const rows = [['Date','Client','Name','Sendout ID','In JIRA','In G-Sheet','Status']];
    results.forEach(r => rows.push([r.date, r.client, r.name, r.id, r.in_jira, r.in_gsheet, r.status]));
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = `orphan_scan_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const groupOrder = ['no_jira','no_gsheet','auto','ok'];

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <HudPanel>
        <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
          <div style={{ flex:'0 0 auto' }}>
            <Overline style={{ marginBottom:4 }}>Days ahead</Overline>
            <input type="number" min={1} max={30} value={daysAhead}
              onChange={e=>setDaysAhead(Number(e.target.value))}
              style={{ width:70, padding:'8px 10px', borderRadius:4, border:`1px solid ${t.border.input}`, fontFamily:t.font.mono, fontSize:13, color:t.fg[1], background:t.bg.surface2, outline:'none' }} />
          </div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:10, paddingBottom:0, marginTop:20 }}>
            <Button onClick={runScan} disabled={loading}>
              {loading ? <><span className="vp-spinner" /> Scanning all accounts…</> : '🔍 Scan all accounts'}
            </Button>
            {scanData && <Button variant="ghost" onClick={()=>setScanData(null)}>Clear</Button>}
            {scanData && <Button variant="ghost" onClick={exportCsv}>Export CSV</Button>}
          </div>
          <div style={{ marginLeft:'auto', fontFamily:t.font.mono, fontSize:11, color:t.fg[3], textAlign:'right', lineHeight:1.6 }}>
            Finds DMA sendouts with no matching JIRA ticket or G-Sheet row.<br/>
            <span style={{ color:t.ok.base }}>config ✓</span> = DMA filters match expected config &nbsp;·&nbsp;
            <span style={{ color:t.danger.base }}>config ✗</span> = required filter missing
            <span style={{ color:t.fg[4] }}> (e.g. REWE: excl. declined_new_terms · Nahkauf: offset_days=1)</span>
          </div>
        </div>
      </HudPanel>

      {error && <div style={{ padding:'12px 16px', borderRadius:4, background:t.danger.soft, border:`1px solid ${t.danger.ring}`, color:t.danger.base, fontSize:13 }}>⚠️ {error}</div>}

      {!scanData && !loading && (
        <div style={{ padding:48, textAlign:'center', color:t.fg[3], fontFamily:t.font.mono, fontSize:12 }}>Click <strong>Scan all accounts</strong> to start.</div>
      )}

      {scanData && (
        <>
          {/* Source counts — shows if JIRA/G-Sheet were actually loaded */}
          <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
            {scanData.jira_count !== null && (
              <div style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:4, background: scanData.jira_count > 0 ? t.ok.soft : t.danger.soft, border:`1px solid ${scanData.jira_count > 0 ? t.ok.ring : t.danger.ring}`, fontSize:12, fontFamily:t.font.mono, color: scanData.jira_count > 0 ? t.ok.base : t.danger.base }}>
                {scanData.jira_count > 0 ? '✅' : '❌'} JIRA: {scanData.jira_count} ticket(s) loaded
              </div>
            )}
            {scanData.gsheet_count !== null && (
              <div style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:4, background: scanData.gsheet_count > 0 ? t.ok.soft : t.warn.soft, border:`1px solid ${scanData.gsheet_count > 0 ? t.ok.ring : t.warn.ring}`, fontSize:12, fontFamily:t.font.mono, color: scanData.gsheet_count > 0 ? t.ok.base : t.warn.base }}>
                {scanData.gsheet_count > 0 ? '✅' : '⚠️'} G-Sheet: {scanData.gsheet_count} date(s) indexed
              </div>
            )}
          </div>

          {/* Summary metrics */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, background:t.bg.surface1, border:`1px solid ${t.border.base}`, borderRadius:6, padding:'18px 22px' }}>
            <Readout label="Total sendouts" value={<span>{results.length}</span>} />
            <Readout label="Matched"        value={<span>{okCount + autoCount}</span>} valueKind="ok" />
            <Readout label="Untracked"      value={<span>{orphans.length}</span>} valueKind={orphans.length > 0 ? 'danger' : 'ok'} />
            <Readout label="Automated"      value={<span>{autoCount}</span>} valueKind="accent" sub="no JIRA required" />
          </div>

          {orphans.length === 0 && (
            <div style={{ padding:'16px 20px', borderRadius:6, background:t.ok.soft, border:`1px solid ${t.ok.ring}`, color:t.ok.base, fontSize:14, fontWeight:500 }}>✅ All sendouts are tracked in JIRA and G-Sheet (+{daysAhead}d window).</div>
          )}

          {results.length > 0 && (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:t.fg[2], cursor:'pointer', userSelect:'none' }}>
                <input type="checkbox" checked={showOk} onChange={e=>setShowOk(e.target.checked)} />
                Show matched sendouts
              </label>
              <span style={{ fontSize:12, color:t.fg[3] }}>{displayed.length} row(s) shown</span>
            </div>
          )}

          {/* Results grouped by status */}
          {groupOrder.map(status => {
            const group = displayed.filter(r => r.status === status);
            if (!group.length) return null;
            const m = STATUS_META[status];
            return (
              <div key={status}>
                <SectionHeader style={{ marginTop:8 }}>{m.icon} {m.label} ({group.length})</SectionHeader>
                {group.map((r,i) => <OrphanRow key={`${r.client}-${r.date}-${i}`} r={r} />)}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}
