<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div>
      <div class="overline" style="margin-bottom:6px;">— Default fonts</div>
      <div style="font-family:'Space Grotesk', sans-serif; font-weight:500; font-size:22px; color:var(--fg-1); letter-spacing:-0.02em;">Space Grotesk — geometric, technical, contemporary.</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:14px; color:var(--fg-2); margin-top:6px;">JetBrains Mono — for every value, identifier, readout, diff line.</div>
    </div>
    <hr class="dashed-rule" />
    <div style="display:grid; grid-template-columns: 90px 1fr; row-gap:8px; column-gap:18px; align-items:baseline;">
      <div class="value muted">display</div>
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; color:var(--fg-1); letter-spacing:-0.02em;">Sendout Validator Pro</div>
      <div class="value muted">overline</div>
      <div class="overline">— validation engine · ops · 1.0</div>
      <div class="value muted">body</div>
      <div style="font-size:13px; color:var(--fg-1);">The system reads as a console first, a product second.</div>
      <div class="value muted">mono</div>
      <div style="font-family:var(--font-mono); font-size:13px; color:var(--fg-1); letter-spacing:.02em;">sendout = 9b3f-8e8c-2c4f-aaaa</div>
    </div>
  </div>
</div></body></html>
