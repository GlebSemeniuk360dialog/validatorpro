<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
.nav { display:flex; gap:4px; background:#12141f; border:1px solid var(--border-1); border-radius:8px; padding:5px; }
.nav-btn { flex:1; padding:9px 12px; background:transparent; color:var(--fg-3); border-radius:4px; font-family:var(--font-sans); font-size:13px; font-weight:500; text-align:center; white-space:nowrap; cursor:pointer; transition: all .18s; }
.nav-btn:hover  { background:var(--bg-surface-3); color:var(--fg-1); }
.nav-btn.active { background:#3d4bff; color:#fff; }
</style></head>
<body><div class="card">
  <div class="nav" style="max-width:480px;">
    <div class="nav-btn active">Setup</div>
    <div class="nav-btn">Content</div>
    <div class="nav-btn">Visuals</div>
    <div class="nav-btn">AI</div>
  </div>
  <div class="nav" style="max-width:480px;">
    <div class="nav-btn">Validator</div>
    <div class="nav-btn active">Orphan Scanner</div>
    <div class="nav-btn">Dashboard</div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Tab strip lives inside a 12px-radius rail; pills inside are 8px. Active pill goes <strong>solid brand</strong>, hover gets the surface bump <code>#1e2235</code>.</div>
</div></body></html>
