<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:18px; align-items:flex-end;">
    <div style="text-align:center;"><div style="width:60px; height:60px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:2px;"></div><div class="label" style="margin-top:8px;">2 · xs</div><div class="value muted">code, diff line</div></div>
    <div style="text-align:center;"><div style="width:60px; height:60px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:3px;"></div><div class="label" style="margin-top:8px;">3 · sm</div><div class="value muted">corner accent</div></div>
    <div style="text-align:center;"><div style="width:60px; height:60px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:4px;"></div><div class="label" style="margin-top:8px;">4 · md</div><div class="value muted">button, input, url chip</div></div>
    <div style="text-align:center;"><div style="width:60px; height:60px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px;"></div><div class="label" style="margin-top:8px;">6 · lg</div><div class="value muted">card, panel</div></div>
    <div style="text-align:center;"><div style="width:60px; height:60px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:8px;"></div><div class="label" style="margin-top:8px;">8 · xl</div><div class="value muted">nav bar rail</div></div>
    <div style="text-align:center;"><div style="width:60px; height:30px; background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:999px;"></div><div class="label" style="margin-top:8px;">∞ · pill</div><div class="value muted">badge, tag</div></div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">v2 tightened the geometry: cards <code>6</code>, controls <code>4</code>, nav <code>8</code>, pills go full <code>999</code>. Sharper, more terminal-like silhouettes.</div>
</div></body></html>
