<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
    <div style="background:#f6f8fb; border:1px solid var(--border-1); border-radius:6px; padding:14px; height:84px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label">App ground</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">#f6f8fb</div>
    </div>
    <div style="background:#ffffff; border:1px solid var(--border-1); border-radius:6px; padding:14px; height:84px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label">Surface 1 · card</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">#ffffff</div>
    </div>
    <div style="background:#eef2f7; border:1px solid var(--border-1); border-radius:6px; padding:14px; height:84px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label">Surface 3 · hover / code</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">#eef2f7</div>
    </div>
    <div style="background:#0e2a2a; border:1px solid #0e2a2a; border-radius:6px; padding:14px; height:84px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label" style="color:#b3dfdf;">Brand dark · logo</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#b3dfdf;">#0e2a2a</div>
    </div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Three light surfaces above the cool ground, plus one dark teal reserved for the brand mark. Hairline borders <code>#e6eaef</code> and <code>#d6dce5</code> separate them.</div>
</div></body></html>
