<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
    <div style="background:#0c8f4a15; border:1px solid #0c8f4a40; border-radius:6px; padding:14px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:10px; height:10px; border-radius:50%; background:#0c8f4a; box-shadow:0 0 4px rgba(12,143,74,0.4);"></div>
        <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.12em; color:#0c8f4a;">OK · ready</div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#0c8f4a; margin-top:10px;">#0c8f4a</div>
    </div>
    <div style="background:#dc262615; border:1px solid #dc262640; border-radius:6px; padding:14px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:10px; height:10px; border-radius:50%; background:#dc2626; box-shadow:0 0 4px rgba(220,38,38,0.4);"></div>
        <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.12em; color:#dc2626;">Danger · fail</div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#dc2626; margin-top:10px;">#dc2626</div>
    </div>
    <div style="background:#c47d0a15; border:1px solid #c47d0a40; border-radius:6px; padding:14px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:10px; height:10px; border-radius:50%; background:#c47d0a; box-shadow:0 0 4px rgba(196,125,10,0.4);"></div>
        <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.12em; color:#c47d0a;">Warn</div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#c47d0a; margin-top:10px;">#c47d0a</div>
    </div>
    <div style="background:#00a8c815; border:1px solid #00a8c840; border-radius:6px; padding:14px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:10px; height:10px; border-radius:50%; background:#00a8c8; box-shadow:0 0 4px rgba(0,168,200,0.4);"></div>
        <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.12em; color:#00a8c8;">Accent · live</div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#00a8c8; margin-top:10px;">#00a8c8</div>
    </div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Status palette tuned for white backgrounds — readable contrast, matching the screen colors in 360dialog's "READY" green dot, error states, and "High" pale-green pill.</div>
</div></body></html>
