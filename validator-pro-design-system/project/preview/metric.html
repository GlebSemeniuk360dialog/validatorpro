<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
.metric { background:#12141f; border:1px solid var(--border-1); border-radius:6px; padding:16px 18px; }
.metric-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--fg-3); margin-bottom:6px; }
.metric-value { font-size:18px; font-weight:600; color:var(--fg-1); }
.metric-value.ok     { color:#00d4aa; }
.metric-value.danger { color:#ff4d6d; }
.metric-value.warn   { color:#ffb547; }
</style></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
    <div class="metric"><div class="metric-label">Total sendouts</div><div class="metric-value">42</div></div>
    <div class="metric"><div class="metric-label">✅ Matched</div><div class="metric-value ok">38</div></div>
    <div class="metric"><div class="metric-label">⚠️ Untracked</div><div class="metric-value danger">4</div></div>
    <div class="metric"><div class="metric-label">Pending tickets</div><div class="metric-value warn">12</div></div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Same card chrome as everything else — only the value swaps to a status color. Label sits above value (not below). The label can carry an emoji prefix.</div>
</div></body></html>
