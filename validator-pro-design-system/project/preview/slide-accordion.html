<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
.slide { background:#12141f; border:1px solid var(--border-1); border-radius:6px; overflow:hidden; }
.slide-hdr { display:flex; align-items:center; gap:10px; padding:14px 18px; cursor:pointer; font-size:13px; font-weight:500; color:var(--fg-1); }
.slide-hdr:hover { background:#1a1d2e; }
.slide-arrow { font-size:16px; color:var(--fg-3); transition:transform .2s; display:inline-block; }
.slide-arrow.open { transform: rotate(90deg); }
.slide-body { padding:14px 18px; border-top:1px solid var(--border-1); }
.slide-num { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#7b87ff; }
</style></head>
<body><div class="card">
  <div class="slide">
    <div class="slide-hdr">
      <span class="slide-arrow open">›</span>
      <span class="slide-num">Slide 1</span>
    </div>
    <div class="slide-body" style="font-size:12px; font-family:var(--font-mono); color:var(--fg-1); white-space:pre-wrap;">Body: Hier findest du unsere Angebote für die kommende Woche ⬇️
Button: Zum Prospekt</div>
  </div>
  <div class="slide">
    <div class="slide-hdr">
      <span class="slide-arrow">›</span>
      <span class="slide-num">Slide 2</span>
    </div>
  </div>
  <div class="slide">
    <div class="slide-hdr">
      <span class="slide-arrow">›</span>
      <span class="slide-num">Slide 3</span>
    </div>
  </div>
</div></body></html>
