<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="background:#ffffff; border:1px solid var(--border-1); border-radius:6px; padding:16px 18px; display:flex; flex-direction:column; gap:12px;">
    <div style="display:flex; align-items:baseline; gap:14px;">
      <div style="font-size:22px; color:#0f1828; font-weight:500; min-width:240px; font-family:var(--font-display);">Primary · #0f1828</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">--fg-1 · default body</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <div style="font-size:22px; color:#475068; font-weight:400; min-width:240px; font-family:var(--font-display);">Secondary · #475068</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">--fg-2 · sidebar, secondary</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <div style="font-size:22px; color:#8893a3; font-weight:400; min-width:240px; font-family:var(--font-display);">Muted · #8893a3</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">--fg-3 · all overline labels</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <div style="font-size:22px; color:#aab3c1; font-weight:400; min-width:240px; font-family:var(--font-display);">Disabled · #aab3c1</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">--fg-4 · placeholders</div>
    </div>
  </div>
</div></body></html>
