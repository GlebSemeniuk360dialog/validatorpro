<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:12px;">
    <div style="flex:2; background:#0fb5b5; border-radius:6px; padding:18px 20px; display:flex; flex-direction:column; justify-content:space-between; min-height:120px; box-shadow: 0 0 20px rgba(15, 181, 181, 0.18);">
      <div style="font-size:11px; font-family:var(--font-mono); font-weight:500; text-transform:uppercase; letter-spacing:.16em; color:#ffffff; opacity:.85;">— Brand · teal</div>
      <div style="display:flex; align-items:baseline; justify-content:space-between;">
        <div style="font-family:var(--font-display); font-size:24px; font-weight:600; color:#fff; letter-spacing:-0.02em;">#0fb5b5</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:#fff; opacity:.75;">rgb 15 181 181</div>
      </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
      <div style="background:#0ca0a0; border-radius:4px; padding:10px 14px; color:#fff; font-size:12px; font-family:var(--font-sans);">Hover <span style="opacity:.8; font-family:var(--font-mono);">#0ca0a0</span></div>
      <div style="background:#0fb5b515; border:1px solid #0fb5b540; border-radius:4px; padding:10px 14px; color:#0a8080; font-size:12px;">Soft fill <span style="opacity:.7; font-family:var(--font-mono);">15% / 40%</span></div>
      <div style="background:transparent; border:1px solid #0fb5b5; border-radius:4px; padding:10px 14px; color:#0a8080; font-size:12px;">Brand text <span style="opacity:.7; font-family:var(--font-mono);">#0a8080</span></div>
    </div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Primary action color — matches 360dialog's <code>Start billing</code> / <code>Edit</code> buttons. Hover <em>darkens</em> rather than lightens. Used on every primary CTA, active nav, and the focus ring.</div>
</div></body></html>
