<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; font-size:24px; text-align:center;">
    <div><div>✅</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">pass</div></div>
    <div><div>❌</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">fail</div></div>
    <div><div>⚠️</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">warn</div></div>
    <div><div>🔴</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">no_jira</div></div>
    <div><div>🟡</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">no_gsheet</div></div>
    <div><div>🟢</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">matched</div></div>
    <div><div>🔵</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">auto</div></div>
    <div><div>⚡</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">product</div></div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; font-size:24px; text-align:center; color:var(--fg-1);">
    <div><div>🎯</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">client</div></div>
    <div><div>🎫</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">ticket</div></div>
    <div><div>📅</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">schedule</div></div>
    <div><div>🚀</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">sendout</div></div>
    <div><div>🤖</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">ai</div></div>
    <div><div>🔄</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">refresh</div></div>
    <div><div>🔍</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">search</div></div>
    <div><div>🔒</div><div style="font-size:10px; color:var(--fg-3); margin-top:4px; font-family:var(--font-mono);">auth</div></div>
  </div>
  <div style="display:flex; gap:24px; align-items:center; padding-top:6px; border-top:1px solid var(--border-1);">
    <div style="font-size:22px; color:var(--fg-1); font-family:var(--font-mono);">▶ &nbsp; ✕ &nbsp; ← &nbsp; → &nbsp; ›</div>
    <div style="color:var(--fg-3); font-size:11px;">Unicode action glyphs. No icon font is loaded.</div>
  </div>
</div></body></html>
