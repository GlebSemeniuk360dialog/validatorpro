<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <!-- HUD-framed active panel -->
  <div class="hud" style="background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px; padding:18px 22px; margin:8px;">
    <span class="hud-c1"></span><span class="hud-c2"></span>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <div class="overline" style="color:var(--accent);">— Active panel · ticket lock</div>
      <span class="bracket">LIVE</span>
    </div>
    <div style="font-family:var(--font-mono); font-size:13px; color:var(--fg-1); letter-spacing:.02em;">
      MAS-4141 &nbsp;·&nbsp; ALDI Sued &nbsp;·&nbsp; 2026-10-17T09:45:36Z
    </div>
    <hr class="dashed-rule" style="border-color:var(--border-hud); margin:14px 0;" />
    <div style="display:flex; gap:24px;">
      <div class="readout"><span class="k">checks</span><span class="v accent">14/14</span></div>
      <div class="readout"><span class="k">drift</span><span class="v">+18 / −4</span></div>
      <div class="readout"><span class="k">latency</span><span class="v">412<span style="color:var(--fg-3); font-size:11px;">ms</span></span></div>
    </div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Cyan <span class="bracket">L</span>-bracket corners + dashed accent divider mark a "focused / live" container. Reserved for the active record — never decorative.</div>
</div></body></html>
