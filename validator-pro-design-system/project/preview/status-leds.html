<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px;">
    <div style="background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px; padding:12px 16px; display:flex; align-items:center; gap:10px;">
      <span class="led ok pulse"></span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-3);">DMA · 200 OK</span>
      <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ok);">live</span>
    </div>
    <div style="background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px; padding:12px 16px; display:flex; align-items:center; gap:10px;">
      <span class="led warn pulse"></span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-3);">G-Sheet · stale 4m</span>
      <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--warn);">warn</span>
    </div>
    <div style="background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px; padding:12px 16px; display:flex; align-items:center; gap:10px;">
      <span class="led danger pulse"></span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-3);">JIRA · auth fail</span>
      <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--danger);">error</span>
    </div>
    <div style="background:var(--bg-surface-1); border:1px solid var(--border-1); border-radius:6px; padding:12px 16px; display:flex; align-items:center; gap:10px;">
      <span class="led dim"></span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-3);">Slack · webhook off</span>
      <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--fg-4);">idle</span>
    </div>
  </div>
  <div style="color:var(--fg-3); font-size:11px; line-height:1.6;">Status LEDs — 8px dots with colored glow, optionally pulsing for "live" signals. Use in the sidebar's connection rail and at the top of the dashboard.</div>
</div></body></html>
