<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body><div class="card">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div>
      <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--fg-3); margin-bottom:6px;">Card title · 11/600/.08em</div>
      <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-1);">audience_filter = locale=de · shop_number=001</div>
    </div>
    <div style="border-top:1px solid var(--border-1); padding-top:14px;">
      <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--fg-3); padding-bottom:8px; border-bottom:1px solid var(--border-1); margin-bottom:10px;">Section header · 11/600/.1em + 1px rule</div>
      <div style="font-size:13px; color:var(--fg-1);">Body sits at 13px DM Sans regular. Reads as default text everywhere outside cards.</div>
    </div>
    <div>
      <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--brand-text);">Markdown h3 · 11/600/.05em · brand text</div>
      <div style="font-size:13px; color:var(--fg-1); margin-top:4px;">Used inside the AI report block.</div>
    </div>
  </div>
</div></body></html>
